<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비밀번호 찾기 - 알비</title>
    <link href="/styles.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Pretendard', 'Apple SD Gothic Neo', sans-serif;
            background: #f8f9fa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .find-container {
            width: 100%;
            max-width: 480px;
            margin: 20px;
        }

        .find-card {
            background: white;
            border-radius: 12px;
            padding: 48px 40px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }

        .find-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .find-header .logo {
            width: 64px;
            height: 64px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, #FF6B35 0%, #FF8A5C 100%);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            color: white;
        }

        .find-header h1 {
            font-size: 24px;
            font-weight: 700;
            color: #1a1a1a;
            margin: 0 0 12px 0;
        }

        .find-header p {
            font-size: 14px;
            color: #666;
            margin: 0;
            line-height: 1.5;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            font-size: 14px;
            border: 1px solid #ddd;
            border-radius: 8px;
            transition: all 0.2s;
            box-sizing: border-box;
        }

        .form-group input:focus {
            outline: none;
            border-color: #FF6B35;
            box-shadow: 0 0 0 3px rgba(255, 107, 53, 0.1);
        }

        .btn {
            width: 100%;
            padding: 16px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #FF6B35;
            color: white;
        }

        .btn-primary:hover {
            background: #FF5722;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 107, 53, 0.3);
        }

        .btn-primary:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .verification-section {
            display: none;
        }

        .verification-section.active {
            display: block;
        }

        .info-box {
            background: #f8f9fa;
            padding: 16px;
            border-radius: 8px;
            font-size: 14px;
            color: #666;
            margin-bottom: 24px;
            line-height: 1.6;
        }

        .info-box i {
            color: #FF6B35;
            margin-right: 8px;
        }

        .success-message {
            background: #d4edda;
            color: #155724;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 24px;
            display: none;
        }

        .success-message.active {
            display: block;
        }

        .success-message i {
            margin-right: 8px;
        }

        .back-link {
            text-align: center;
            margin-top: 24px;
        }

        .back-link a {
            color: #FF6B35;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
        }

        .back-link a:hover {
            text-decoration: underline;
        }

        .verification-timer {
            color: #FF6B35;
            font-weight: 600;
            font-size: 14px;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div class="find-container">
        <div class="find-card">
            <div class="find-header">
                <div class="logo">
                    <i class="fas fa-briefcase"></i>
                </div>
                <h1>비밀번호 찾기</h1>
                <p>가입하신 이메일 주소를 입력하시면<br>휴대폰 인증 후 비밀번호를 재설정하실 수 있습니다</p>
            </div>

            <!-- 1단계: 이메일/아이디 입력 -->
            <div id="step1" class="step-section">
                <div class="info-box">
                    <i class="fas fa-info-circle"></i>
                    이메일과 아이디를 정확히 입력해주세요
                </div>

                <form id="emailForm">
                    <div class="form-group">
                        <label for="email">이메일</label>
                        <input 
                            type="email" 
                            id="email" 
                            placeholder="example@email.com" 
                            required
                        >
                    </div>
                    <div class="form-group">
                        <label for="phone">휴대폰 번호</label>
                        <input 
                            type="tel" 
                            id="phone" 
                            placeholder="010-1234-5678" 
                            required
                        >
                    </div>
                    <button type="submit" class="btn btn-primary">
                        인증번호 받기
                    </button>
                </form>
            </div>

            <!-- 2단계: 인증 코드 입력 -->
            <div id="step2" class="step-section verification-section">
                <div class="success-message" id="emailSentMessage">
                    <i class="fas fa-check-circle"></i>
                    인증 코드가 이메일로 발송되었습니다
                </div>

                <div class="info-box">
                    <i class="fas fa-envelope"></i>
                    <span id="emailDisplay"></span>로 발송된<br>
                    6자리 인증 코드를 입력해주세요
                    <div class="verification-timer" id="timer"></div>
                </div>

                <form id="verificationForm">
                    <div class="form-group">
                        <label for="verificationCode">인증 코드</label>
                        <input 
                            type="text" 
                            id="verificationCode" 
                            placeholder="6자리 숫자 입력" 
                            maxlength="6"
                            required
                        >
                    </div>
                    <button type="submit" class="btn btn-primary">
                        인증 확인
                    </button>
                </form>

                <button 
                    type="button" 
                    class="btn btn-secondary" 
                    id="resendBtn"
                    style="margin-top: 12px; background: #f8f9fa; color: #333;"
                >
                    인증 코드 재발송
                </button>
            </div>

            <!-- 3단계: 새 비밀번호 설정 -->
            <div id="step3" class="step-section verification-section">
                <div class="success-message active">
                    <i class="fas fa-check-circle"></i>
                    인증이 완료되었습니다. 새 비밀번호를 설정해주세요
                </div>

                <form id="resetPasswordForm">
                    <div class="form-group">
                        <label for="newPassword">새 비밀번호</label>
                        <input 
                            type="password" 
                            id="newPassword" 
                            placeholder="8자 이상 입력" 
                            required
                        >
                    </div>
                    <div class="form-group">
                        <label for="confirmPassword">비밀번호 확인</label>
                        <input 
                            type="password" 
                            id="confirmPassword" 
                            placeholder="비밀번호 재입력" 
                            required
                        >
                    </div>
                    <button type="submit" class="btn btn-primary">
                        비밀번호 변경
                    </button>
                </form>
            </div>

            <div class="back-link">
                <a href="/login.html">
                    <i class="fas fa-arrow-left"></i> 로그인으로 돌아가기
                </a>
            </div>
        </div>
    </div>

    <script>
        console.log('🔍 비밀번호 찾기 페이지 로드');

        let verificationToken = null;
        let timerInterval = null;
        let timeLeft = 300; // 5분

        // 타이머 시작
        function startTimer() {
            clearInterval(timerInterval);
            timeLeft = 300;
            
            timerInterval = setInterval(() => {
                timeLeft--;
                
                const minutes = Math.floor(timeLeft / 60);
                const seconds = timeLeft % 60;
                document.getElementById('timer').textContent = 
                    `유효시간: ${minutes}:${seconds.toString().padStart(2, '0')}`;
                
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    alert('인증 시간이 만료되었습니다. 다시 시도해주세요.');
                    window.location.reload();
                }
            }, 1000);
        }

        // 전화번호 자동 포맷팅
        document.getElementById('phone').addEventListener('input', (e) => {
            let value = e.target.value.replace(/[^0-9]/g, '');
            
            if (value.length <= 3) {
                e.target.value = value;
            } else if (value.length <= 7) {
                e.target.value = value.slice(0, 3) + '-' + value.slice(3);
            } else {
                e.target.value = value.slice(0, 3) + '-' + value.slice(3, 7) + '-' + value.slice(7, 11);
            }
        });

        // 1단계: 이메일/휴대폰 입력 → 인증번호 발송
        document.getElementById('emailForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();
            const phone = document.getElementById('phone').value.trim();

            console.log('📧 인증번호 발송 요청:', { email, phone });

            try {
                const response = await fetch('/api/auth/forgot-password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, phone })
                });

                const data = await response.json();
                console.log('📦 API 응답:', data);

                if (data.success) {
                    // 2단계로 이동
                    document.getElementById('step1').style.display = 'none';
                    document.getElementById('step2').classList.add('active');
                    document.getElementById('emailDisplay').textContent = phone;
                    document.getElementById('emailSentMessage').classList.add('active');
                    
                    verificationToken = data.token;
                    startTimer();
                    
                    alert('인증번호가 휴대폰으로 발송되었습니다!');
                } else {
                    alert(data.error || '사용자를 찾을 수 없습니다');
                }
            } catch (error) {
                console.error('❌ 에러:', error);
                alert('인증번호 발송 중 오류가 발생했습니다');
            }
        });

        // 2단계: 인증 코드 확인
        document.getElementById('verificationForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const code = document.getElementById('verificationCode').value.trim();

            console.log('🔐 인증 코드 확인:', { code, verificationToken });

            try {
                const response = await fetch('/api/auth/verify-reset-code', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ 
                        token: verificationToken,
                        code 
                    })
                });

                const data = await response.json();
                console.log('📦 API 응답:', data);

                if (data.success) {
                    clearInterval(timerInterval);
                    
                    // 3단계로 이동
                    document.getElementById('step2').classList.remove('active');
                    document.getElementById('step3').classList.add('active');
                } else {
                    alert(data.error || '인증 코드가 일치하지 않습니다');
                }
            } catch (error) {
                console.error('❌ 에러:', error);
                alert('인증 코드 확인 중 오류가 발생했습니다');
            }
        });

        // 인증 코드 재발송
        document.getElementById('resendBtn').addEventListener('click', () => {
            document.getElementById('emailForm').dispatchEvent(new Event('submit'));
        });

        // 3단계: 새 비밀번호 설정
        document.getElementById('resetPasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (newPassword.length < 8) {
                alert('비밀번호는 최소 8자 이상이어야 합니다');
                return;
            }

            if (newPassword !== confirmPassword) {
                alert('비밀번호가 일치하지 않습니다');
                return;
            }

            console.log('🔑 비밀번호 재설정 요청');

            try {
                const response = await fetch('/api/auth/reset-password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ 
                        token: verificationToken,
                        newPassword 
                    })
                });

                const data = await response.json();
                console.log('📦 API 응답:', data);

                if (data.success) {
                    alert('✅ 비밀번호가 성공적으로 변경되었습니다!\n로그인 페이지로 이동합니다.');
                    window.location.href = '/login.html';
                } else {
                    alert(data.error || '비밀번호 변경에 실패했습니다');
                }
            } catch (error) {
                console.error('❌ 에러:', error);
                alert('비밀번호 변경 중 오류가 발생했습니다');
            }
        });
    </script>
</body>
</html>
