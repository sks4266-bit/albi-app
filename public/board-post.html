<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>게시글 상세 - 자유게시판</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet">
    <link href="/styles.css" rel="stylesheet">
</head>
<body class="bg-gray-50">
    <!-- 네비게이션 바 -->
    <nav class="bg-white shadow-md">
        <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <a href="/" class="text-xl font-bold text-purple-600">
                    <i class="fas fa-briefcase mr-2"></i>알비
                </a>
                <span class="text-gray-400">|</span>
                <h1 class="text-lg font-semibold text-gray-800">자유게시판 📋</h1>
            </div>
            <button onclick="window.location.href='/board.html'" class="text-gray-600 hover:text-gray-800">
                <i class="fas fa-arrow-left mr-1"></i> 목록
            </button>
        </div>
    </nav>

    <!-- 메인 콘텐츠 -->
    <div class="max-w-4xl mx-auto px-4 py-6">
        <!-- 로딩 -->
        <div id="loadingSpinner" class="text-center py-12">
            <i class="fas fa-spinner fa-spin text-4xl text-purple-600"></i>
            <p class="mt-2 text-gray-600">게시글을 불러오는 중...</p>
        </div>

        <!-- 게시글 상세 -->
        <div id="postDetail" class="hidden">
            <!-- 게시글 내용 -->
            <div class="bg-white rounded-lg shadow-sm p-6 mb-4">
                <div id="postContent">
                    <!-- 게시글 내용이 여기에 렌더링됩니다 -->
                </div>
            </div>

            <!-- 댓글 섹션 -->
            <div class="bg-white rounded-lg shadow-sm p-6">
                <h3 class="text-lg font-semibold text-gray-800 mb-4">
                    <i class="fas fa-comments mr-2"></i>
                    댓글 <span id="commentCount" class="text-purple-600">0</span>
                </h3>

                <!-- 댓글 작성 -->
                <div class="mb-6 pb-6 border-b border-gray-200">
                    <textarea 
                        id="commentInput" 
                        placeholder="댓글을 입력하세요 (최대 500자)"
                        maxlength="500"
                        rows="3"
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500 resize-none mb-2"
                    ></textarea>
                    <div class="flex items-center justify-between">
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="checkbox" id="commentAnonymousCheck" class="w-4 h-4 text-purple-600 rounded">
                            <span class="text-sm text-gray-700">익명으로 작성</span>
                        </label>
                        <button 
                            onclick="submitComment()"
                            id="commentSubmitBtn"
                            class="bg-purple-600 text-white px-6 py-2 rounded-lg hover:bg-purple-700 transition"
                        >
                            댓글 작성
                        </button>
                    </div>
                </div>

                <!-- 댓글 목록 -->
                <div id="commentsContainer">
                    <!-- 댓글이 여기에 렌더링됩니다 -->
                </div>

                <div id="emptyComments" class="hidden text-center py-8 text-gray-500">
                    <i class="fas fa-comment-slash text-4xl mb-2"></i>
                    <p>아직 댓글이 없습니다. 첫 댓글을 남겨보세요!</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentPost = null;
        let currentUser = null;
        const postId = new URLSearchParams(window.location.search).get('id');

        // 사용자 정보 가져오기
        currentUser = JSON.parse(localStorage.getItem('albi_user_info') || '{}');
        if (!currentUser.userId) {
            currentUser.userId = localStorage.getItem('albi_user_id');
            currentUser.userName = localStorage.getItem('albi_user_name') || '알비사용자';
        }

        // 페이지 로드 시 게시글 불러오기
        async function loadPostDetail() {
            if (!postId) {
                alert('게시글 ID가 없습니다.');
                window.location.href = '/board.html';
                return;
            }

            try {
                const response = await fetch(`/api/board/posts/${postId}`);
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();

                if (data.success) {
                    currentPost = data.data.post;
                    renderPost(data.data.post);
                    renderComments(data.data.comments);
                } else {
                    alert(data.error || '게시글을 불러오는데 실패했습니다.');
                    window.location.href = '/board.html';
                }
            } catch (error) {
                console.error('Error loading post:', error);
                alert('게시글을 불러오는 중 오류가 발생했습니다.');
                window.location.href = '/board.html';
            } finally {
                document.getElementById('loadingSpinner').classList.add('hidden');
                document.getElementById('postDetail').classList.remove('hidden');
            }
        }

        // 게시글 렌더링
        function renderPost(post) {
            const container = document.getElementById('postContent');
            container.innerHTML = `
                <h1 class="text-2xl font-bold text-gray-900 mb-4">${escapeHtml(post.title)}</h1>
                
                <div class="flex items-center justify-between mb-4 pb-4 border-b border-gray-200">
                    <div class="flex items-center gap-4 text-sm text-gray-600">
                        <span><i class="fas fa-user mr-1"></i>${escapeHtml(post.author_name)}</span>
                        <span><i class="fas fa-clock mr-1"></i>${getTimeAgo(post.created_at)}</span>
                        <span><i class="fas fa-eye mr-1"></i>${post.views}</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <button onclick="toggleLike()" id="likeBtn" class="flex items-center gap-1 px-3 py-1 rounded-lg border border-gray-300 hover:bg-gray-50 transition">
                            <i class="far fa-heart text-red-500"></i>
                            <span id="likeCount">${post.likes}</span>
                        </button>
                        <button onclick="sharePost()" class="px-3 py-1 rounded-lg border border-gray-300 hover:bg-gray-50 transition">
                            <i class="fas fa-share-alt text-gray-600"></i>
                        </button>
                        <button onclick="reportPost()" class="px-3 py-1 rounded-lg border border-gray-300 hover:bg-gray-50 transition">
                            <i class="fas fa-flag text-gray-600"></i>
                        </button>
                    </div>
                </div>

                <div class="prose max-w-none text-gray-800 whitespace-pre-wrap">${escapeHtml(post.content)}</div>
            `;
        }

        // 댓글 렌더링
        function renderComments(comments) {
            const container = document.getElementById('commentsContainer');
            const emptyState = document.getElementById('emptyComments');
            const commentCount = document.getElementById('commentCount');

            commentCount.textContent = comments.length;

            if (!comments || comments.length === 0) {
                container.classList.add('hidden');
                emptyState.classList.remove('hidden');
                return;
            }

            container.classList.remove('hidden');
            emptyState.classList.add('hidden');

            container.innerHTML = comments.map(comment => `
                <div class="py-4 border-b border-gray-200 last:border-b-0">
                    <div class="flex items-start justify-between mb-2">
                        <div class="flex items-center gap-2">
                            <span class="font-semibold text-gray-800">${escapeHtml(comment.author_name)}</span>
                            <span class="text-sm text-gray-500">${getTimeAgo(comment.created_at)}</span>
                        </div>
                        <button onclick="reportComment(${comment.id})" class="text-gray-400 hover:text-red-500 text-sm">
                            <i class="fas fa-flag"></i>
                        </button>
                    </div>
                    <p class="text-gray-700 whitespace-pre-wrap">${escapeHtml(comment.content)}</p>
                </div>
            `).join('');
        }

        // 댓글 작성
        async function submitComment() {
            // 로그인 체크
            if (!currentUser.userId) {
                if (confirm('로그인이 필요합니다. 로그인 페이지로 이동하시겠습니까?')) {
                    localStorage.setItem('redirect_after_login', window.location.href);
                    window.location.href = '/login.html';
                }
                return;
            }
            
            const content = document.getElementById('commentInput').value.trim();
            const isAnonymous = document.getElementById('commentAnonymousCheck').checked;

            if (!content) {
                alert('댓글 내용을 입력해주세요.');
                return;
            }

            const submitBtn = document.getElementById('commentSubmitBtn');
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>작성 중...';

            try {
                const response = await fetch(`/api/board/posts/${postId}/comments`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        userId: currentUser.userId,
                        authorName: currentUser.userName,
                        content,
                        isAnonymous
                    })
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();

                if (data.success) {
                    alert(data.data.message || '댓글이 작성되었습니다. 💬');
                    document.getElementById('commentInput').value = '';
                    document.getElementById('commentAnonymousCheck').checked = false;
                    loadPostDetail();
                } else {
                    alert(data.error || '댓글 작성에 실패했습니다.');
                }
            } catch (error) {
                console.error('Submit comment error:', error);
                alert('댓글 작성 중 오류가 발생했습니다.');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '댓글 작성';
            }
        }

        // 좋아요 토글
        async function toggleLike() {
            if (!currentUser.userId) {
                if (confirm('로그인이 필요합니다. 로그인 페이지로 이동하시겠습니까?')) {
                    localStorage.setItem('redirect_after_login', window.location.href);
                    window.location.href = '/login.html';
                }
                return;
            }

            try {
                const response = await fetch(`/api/board/posts/${postId}/like`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        userId: currentUser.userId
                    })
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();

                if (data.success) {
                    alert(data.data.message);
                    loadPostDetail();
                } else {
                    alert(data.error || '좋아요 처리에 실패했습니다.');
                }
            } catch (error) {
                console.error('Toggle like error:', error);
                alert('좋아요 처리 중 오류가 발생했습니다.');
            }
        }

        // 게시글 신고
        async function reportPost() {
            if (!currentUser.userId) {
                alert('로그인이 필요합니다.');
                return;
            }

            const reason = prompt('신고 사유를 선택하세요:\n1. 스팸\n2. 욕설/비방\n3. 부적절한 내용\n4. 기타\n\n번호를 입력하세요:');
            
            if (!reason) return;

            const reasonMap = {
                '1': 'spam',
                '2': 'abuse',
                '3': 'inappropriate',
                '4': 'other'
            };

            const selectedReason = reasonMap[reason];
            if (!selectedReason) {
                alert('올바른 번호를 입력해주세요.');
                return;
            }

            try {
                const response = await fetch('/api/board/report', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        reporterId: currentUser.userId,
                        targetType: 'post',
                        targetId: parseInt(postId),
                        reason: selectedReason
                    })
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();

                if (data.success) {
                    alert(data.data.message);
                } else {
                    alert(data.error || '신고 처리에 실패했습니다.');
                }
            } catch (error) {
                console.error('Report error:', error);
                alert('신고 처리 중 오류가 발생했습니다.');
            }
        }

        // 댓글 신고
        async function reportComment(commentId) {
            if (!currentUser.userId) {
                alert('로그인이 필요합니다.');
                return;
            }

            const reason = prompt('신고 사유를 선택하세요:\n1. 스팸\n2. 욕설/비방\n3. 부적절한 내용\n4. 기타\n\n번호를 입력하세요:');
            
            if (!reason) return;

            const reasonMap = {
                '1': 'spam',
                '2': 'abuse',
                '3': 'inappropriate',
                '4': 'other'
            };

            const selectedReason = reasonMap[reason];
            if (!selectedReason) {
                alert('올바른 번호를 입력해주세요.');
                return;
            }

            try {
                const response = await fetch('/api/board/report', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        reporterId: currentUser.userId,
                        targetType: 'comment',
                        targetId: commentId,
                        reason: selectedReason
                    })
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();

                if (data.success) {
                    alert(data.data.message);
                } else {
                    alert(data.error || '신고 처리에 실패했습니다.');
                }
            } catch (error) {
                console.error('Report error:', error);
                alert('신고 처리 중 오류가 발생했습니다.');
            }
        }

        // 공유하기
        function sharePost() {
            const url = window.location.href;
            if (navigator.share) {
                navigator.share({
                    title: currentPost.title,
                    text: currentPost.content.substring(0, 100),
                    url: url
                }).catch(() => {});
            } else {
                navigator.clipboard.writeText(url).then(() => {
                    alert('링크가 복사되었습니다!');
                });
            }
        }

        // 상대 시간 표시
        function getTimeAgo(dateString) {
            try {
                const isoDateString = dateString.replace(' ', 'T') + 'Z';
                const postDate = new Date(isoDateString);
                
                if (isNaN(postDate.getTime())) {
                    return dateString;
                }
                
                const now = new Date();
                const diffMs = now - postDate;
                const diffMins = Math.floor(diffMs / 60000);
                const diffHours = Math.floor(diffMs / 3600000);
                const diffDays = Math.floor(diffMs / 86400000);

                if (diffMins < 1) return '방금 전';
                if (diffMins < 60) return `${diffMins}분 전`;
                if (diffHours < 24) return `${diffHours}시간 전`;
                if (diffDays < 7) return `${diffDays}일 전`;
                
                return postDate.toLocaleDateString('ko-KR');
            } catch (error) {
                console.error('Date parsing error:', error);
                return dateString;
            }
        }

        // HTML 이스케이프
        function escapeHtml(unsafe) {
            return unsafe
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        // 초기 로드
        loadPostDetail();
    </script>
</body>
</html>
