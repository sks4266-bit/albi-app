<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>팀워크 궁합 분석 | 알비</title>
    <meta name="description" content="친구와 직무적성 궁합을 비교하고, 함께 일하기 좋은 조합인지 분석해보세요!">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        .gradient-text {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in {
            animation: fadeIn 0.5s ease-out;
        }
        .result-card {
            animation: fadeIn 0.8s ease-out;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-50 via-purple-50 to-pink-50 min-h-screen">
    <!-- Navigation -->
    <nav class="bg-white shadow-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
            <a href="/" class="text-2xl font-bold gradient-text">알비</a>
            <div class="flex gap-4">
                <a href="/job-test.html" class="text-gray-700 hover:text-blue-600 transition font-semibold">
                    <i class="fas fa-redo mr-1"></i>재시험
                </a>
                <a href="/jobs.html" class="text-gray-700 hover:text-blue-600 transition font-semibold">
                    <i class="fas fa-briefcase mr-1"></i>공고 찾기
                </a>
                <a href="/mypage.html" class="text-gray-700 hover:text-blue-600 transition font-semibold">
                    <i class="fas fa-user mr-1"></i>마이페이지
                </a>
            </div>
        </div>
    </nav>

    <div class="max-w-6xl mx-auto px-4 py-12">
        <!-- 헤더 -->
        <div class="text-center mb-12">
            <div class="text-6xl mb-4">👥</div>
            <h1 class="text-4xl font-bold gradient-text mb-4">팀워크 궁합 분석</h1>
            <p class="text-gray-600 text-lg">두 사람의 직무적성을 비교하고 함께 일하기 좋은 조합인지 확인해보세요!</p>
        </div>

        <!-- 사용자 선택 섹션 -->
        <div id="selectSection" class="mb-12">
            <div class="bg-white rounded-3xl shadow-lg p-8">
                <h2 class="text-2xl font-bold text-gray-800 mb-6">비교할 사람 선택</h2>
                
                <div class="grid md:grid-cols-2 gap-6">
                    <!-- 나 -->
                    <div class="border border-gray-200 rounded-2xl p-6">
                        <h3 class="text-lg font-bold text-gray-800 mb-4">
                            <i class="fas fa-user mr-2 text-blue-500"></i>나
                        </h3>
                        <div id="myResultCard" class="space-y-3">
                            <p class="text-gray-600">테스트 결과를 불러오는 중...</p>
                        </div>
                    </div>
                    
                    <!-- 친구 -->
                    <div class="border border-gray-200 rounded-2xl p-6">
                        <h3 class="text-lg font-bold text-gray-800 mb-4">
                            <i class="fas fa-user-friends mr-2 text-purple-500"></i>친구
                        </h3>
                        <div id="friendResultCard" class="space-y-3">
                            <p class="text-gray-600">친구의 테스트 결과를 불러오는 중...</p>
                        </div>
                        <button onclick="selectFriendResult()" class="mt-4 w-full bg-purple-500 text-white py-3 rounded-lg hover:bg-purple-600 transition font-semibold">
                            <i class="fas fa-plus mr-2"></i>친구 결과 선택
                        </button>
                    </div>
                </div>
                
                <div class="text-center mt-8">
                    <button id="compareBtn" onclick="compareResults()" disabled class="bg-gray-300 text-gray-500 px-8 py-4 rounded-full text-lg font-bold cursor-not-allowed">
                        궁합 분석하기
                    </button>
                </div>
            </div>
        </div>

        <!-- 궁합 결과 섹션 -->
        <div id="resultSection" class="hidden">
            <!-- 궁합도 점수 -->
            <div class="bg-white rounded-3xl shadow-2xl p-8 md:p-12 mb-8 text-center fade-in">
                <h2 class="text-2xl font-bold text-gray-800 mb-6">팀워크 궁합도</h2>
                <div id="compatibilityScore" class="text-7xl font-bold gradient-text mb-4">0%</div>
                <p id="compatibilityLevel" class="text-xl text-gray-600 mb-6">분석 중...</p>
                <div id="compatibilityDescription" class="text-gray-700 max-w-2xl mx-auto">
                    <!-- 궁합 설명 -->
                </div>
            </div>

            <!-- 성향 비교 차트 -->
            <div class="bg-white rounded-3xl shadow-lg p-8 mb-8 result-card">
                <h2 class="text-2xl font-bold text-gray-800 mb-6">
                    <span>📊</span>
                    4차원 성향 비교
                </h2>
                <div class="mb-8">
                    <canvas id="comparisonChart"></canvas>
                </div>
                <div id="scoreComparison" class="grid md:grid-cols-4 gap-4">
                    <!-- 점수 비교 -->
                </div>
            </div>

            <!-- 팀워크 분석 -->
            <div class="bg-white rounded-3xl shadow-lg p-8 mb-8 result-card">
                <h2 class="text-2xl font-bold text-gray-800 mb-6">
                    <span>💪</span>
                    팀워크 분석
                </h2>
                <div id="teamworkAnalysis" class="grid md:grid-cols-2 gap-6">
                    <!-- 강점 & 보완 관계 -->
                </div>
            </div>

            <!-- 추천 협업 방식 -->
            <div class="bg-white rounded-3xl shadow-lg p-8 mb-8 result-card">
                <h2 class="text-2xl font-bold text-gray-800 mb-6">
                    <span>🎯</span>
                    추천 협업 방식
                </h2>
                <div id="recommendedCollaboration" class="space-y-4">
                    <!-- 협업 방식 추천 -->
                </div>
            </div>

            <!-- 공유 버튼 -->
            <div class="text-center">
                <button onclick="shareComparison()" class="bg-blue-500 text-white px-8 py-4 rounded-full text-lg font-bold hover:shadow-lg transition">
                    <i class="fas fa-share-alt mr-2"></i>
                    궁합 결과 공유하기
                </button>
                <br><br>
                <a href="/job-test-compare.html" class="text-blue-600 hover:underline">
                    <i class="fas fa-redo mr-2"></i>다른 사람과 비교하기
                </a>
            </div>
        </div>
    </div>

    <script src="/static/job-test-compare.js"></script>
</body>
</html>
