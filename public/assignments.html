<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>과제 제출 - Albi AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50">
    <div class="container mx-auto px-4 py-8 max-w-6xl">
        <!-- 헤더 -->
        <div class="bg-gradient-to-r from-purple-600 to-pink-600 text-white rounded-lg shadow-lg p-6 mb-6">
            <div class="flex items-center justify-between flex-wrap gap-4">
                <div>
                    <h1 class="text-3xl font-bold mb-2">
                        <i class="fas fa-clipboard-check mr-2"></i>
                        과제 제출
                    </h1>
                    <p class="text-purple-100">AI 피드백으로 실력을 향상시키세요</p>
                </div>
                <div>
                    <a href="/mentor-chat.html" class="bg-white text-purple-600 px-6 py-3 rounded-lg font-bold hover:bg-purple-50 transition-colors inline-block">
                        <i class="fas fa-comments mr-2"></i>
                        AI 멘토로 이동
                    </a>
                </div>
            </div>
        </div>

        <div class="grid lg:grid-cols-3 gap-6">
            <!-- 과제 제출 폼 -->
            <div class="lg:col-span-2">
                <div class="bg-white rounded-lg shadow p-6">
                    <h2 class="text-2xl font-bold mb-6">
                        <i class="fas fa-pen mr-2"></i>
                        새 과제 제출
                    </h2>

                    <form id="assignmentForm" class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">과제 유형</label>
                            <select id="assignmentType" class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-purple-500">
                                <option value="resume">이력서</option>
                                <option value="cover_letter">자기소개서</option>
                                <option value="interview_prep">면접 답변</option>
                                <option value="skill_test">기술 테스트</option>
                                <option value="custom">기타</option>
                            </select>
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">난이도</label>
                            <div class="flex gap-3">
                                <label class="flex-1">
                                    <input type="radio" name="difficulty" value="easy" class="peer hidden">
                                    <div class="cursor-pointer text-center px-4 py-2 border-2 rounded-lg peer-checked:border-green-500 peer-checked:bg-green-50 peer-checked:text-green-700 hover:border-green-300">
                                        <i class="fas fa-smile mr-2"></i>쉬움
                                    </div>
                                </label>
                                <label class="flex-1">
                                    <input type="radio" name="difficulty" value="medium" class="peer hidden" checked>
                                    <div class="cursor-pointer text-center px-4 py-2 border-2 rounded-lg peer-checked:border-yellow-500 peer-checked:bg-yellow-50 peer-checked:text-yellow-700 hover:border-yellow-300">
                                        <i class="fas fa-meh mr-2"></i>보통
                                    </div>
                                </label>
                                <label class="flex-1">
                                    <input type="radio" name="difficulty" value="hard" class="peer hidden">
                                    <div class="cursor-pointer text-center px-4 py-2 border-2 rounded-lg peer-checked:border-red-500 peer-checked:bg-red-50 peer-checked:text-red-700 hover:border-red-300">
                                        <i class="fas fa-frown mr-2"></i>어려움
                                    </div>
                                </label>
                            </div>
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">제목</label>
                            <input type="text" id="title" placeholder="예: 신입 프론트엔드 개발자 이력서" 
                                   class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-purple-500">
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">내용</label>
                            <textarea id="content" rows="10" placeholder="과제 내용을 입력하세요..."
                                      class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-purple-500"></textarea>
                            <p class="text-sm text-gray-500 mt-2">
                                <i class="fas fa-info-circle mr-1"></i>
                                최소 100자 이상 작성해주세요
                            </p>
                        </div>

                        <button type="submit" class="w-full bg-purple-600 text-white px-6 py-4 rounded-lg font-bold hover:bg-purple-700 transition-colors">
                            <i class="fas fa-paper-plane mr-2"></i>
                            과제 제출하기
                        </button>
                    </form>

                    <div id="submitResult" class="mt-4"></div>
                </div>
            </div>

            <!-- 안내 사이드바 -->
            <div class="space-y-6">
                <div class="bg-blue-50 border border-blue-200 rounded-lg p-6">
                    <h3 class="text-lg font-bold text-blue-800 mb-3">
                        <i class="fas fa-lightbulb mr-2"></i>
                        과제 작성 팁
                    </h3>
                    <ul class="space-y-2 text-sm text-blue-700">
                        <li><i class="fas fa-check mr-2"></i>구체적으로 작성하세요</li>
                        <li><i class="fas fa-check mr-2"></i>정확한 정보를 제공하세요</li>
                        <li><i class="fas fa-check mr-2"></i>맞춤법을 확인하세요</li>
                        <li><i class="fas fa-check mr-2"></i>최소 100자 이상 작성하세요</li>
                    </ul>
                </div>

                <div class="bg-gradient-to-br from-purple-100 to-pink-100 rounded-lg p-6">
                    <h3 class="text-lg font-bold text-purple-800 mb-3">
                        <i class="fas fa-robot mr-2"></i>
                        AI 피드백
                    </h3>
                    <p class="text-sm text-purple-700 mb-4">
                        제출 후 1-2분 내에 AI가 상세한 피드백을 제공합니다:
                    </p>
                    <ul class="space-y-2 text-sm text-purple-700">
                        <li><i class="fas fa-star mr-2 text-yellow-500"></i>점수 평가</li>
                        <li><i class="fas fa-thumbs-up mr-2 text-green-500"></i>강점 분석</li>
                        <li><i class="fas fa-chart-line mr-2 text-blue-500"></i>개선사항</li>
                        <li><i class="fas fa-magic mr-2 text-purple-500"></i>구체적 제안</li>
                    </ul>
                </div>
            </div>
        </div>

        <!-- 제출한 과제 목록 -->
        <div class="mt-8 bg-white rounded-lg shadow p-6">
            <h2 class="text-2xl font-bold mb-6">
                <i class="fas fa-history mr-2"></i>
                제출한 과제
            </h2>

            <div id="assignmentList">
                <div class="text-center py-8">
                    <i class="fas fa-spinner fa-spin text-4xl text-gray-400"></i>
                    <p class="text-gray-500 mt-4">과제 목록을 불러오는 중...</p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios@1.6.0/dist/axios.min.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const userId = urlParams.get('user_id') || 'demo-user-123';

        // 과제 제출
        document.getElementById('assignmentForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const type = document.getElementById('assignmentType').value;
            const difficulty = document.querySelector('input[name="difficulty"]:checked').value;
            const title = document.getElementById('title').value.trim();
            const content = document.getElementById('content').value.trim();
            const resultDiv = document.getElementById('submitResult');

            if (!title || !content) {
                resultDiv.innerHTML = '<div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded">제목과 내용을 모두 입력해주세요</div>';
                return;
            }

            if (content.length < 100) {
                resultDiv.innerHTML = '<div class="bg-yellow-100 border border-yellow-400 text-yellow-700 px-4 py-3 rounded">내용을 최소 100자 이상 작성해주세요</div>';
                return;
            }

            resultDiv.innerHTML = '<div class="bg-blue-100 border border-blue-400 text-blue-700 px-4 py-3 rounded"><i class="fas fa-spinner fa-spin mr-2"></i>과제를 제출하는 중...</div>';

            try {
                const response = await axios.post('/api/submit-assignment', {
                    user_id: userId,
                    title,
                    content,
                    assignment_type: type,
                    difficulty
                });

                if (response.data.success) {
                    resultDiv.innerHTML = `<div class="bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded">
                        <i class="fas fa-check-circle mr-2"></i>${response.data.message}
                        <br><small>과제 ID: ${response.data.assignment_id}</small>
                    </div>`;
                    
                    // 폼 초기화
                    document.getElementById('title').value = '';
                    document.getElementById('content').value = '';
                    
                    // 목록 새로고침
                    setTimeout(() => {
                        loadAssignments();
                        resultDiv.innerHTML = '';
                    }, 2000);
                } else {
                    if (response.data.requires_subscription) {
                        resultDiv.innerHTML = '<div class="bg-yellow-100 border border-yellow-400 text-yellow-700 px-4 py-3 rounded"><i class="fas fa-crown mr-2"></i>활성 구독이 필요합니다. <a href="/payment.html" class="underline font-bold">구독하기</a></div>';
                    } else {
                        resultDiv.innerHTML = `<div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded">${response.data.error}</div>`;
                    }
                }
            } catch (error) {
                resultDiv.innerHTML = `<div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded">오류 발생: ${error.message}</div>`;
            }
        });

        // 과제 목록 로드
        async function loadAssignments() {
            try {
                const response = await axios.get(`/api/submit-assignment?user_id=${userId}`);
                
                if (response.data.success) {
                    const { assignments, stats } = response.data.data;
                    renderAssignments(assignments, stats);
                } else {
                    showError('과제 목록을 불러올 수 없습니다');
                }
            } catch (error) {
                console.error('Error loading assignments:', error);
                showError('오류가 발생했습니다: ' + error.message);
            }
        }

        // 과제 목록 렌더링
        function renderAssignments(assignments, stats) {
            const listDiv = document.getElementById('assignmentList');
            
            if (assignments.length === 0) {
                listDiv.innerHTML = `
                    <div class="text-center py-12">
                        <i class="fas fa-inbox text-6xl text-gray-300 mb-4"></i>
                        <p class="text-gray-500 text-lg">아직 제출한 과제가 없습니다</p>
                        <p class="text-gray-400 text-sm">위 폼에서 첫 과제를 제출해보세요!</p>
                    </div>
                `;
                return;
            }

            // 통계 표시
            const statsHTML = `
                <div class="grid md:grid-cols-3 gap-4 mb-6 p-4 bg-gray-50 rounded-lg">
                    <div class="text-center">
                        <p class="text-sm text-gray-600">총 제출</p>
                        <p class="text-2xl font-bold text-blue-600">${stats.total_assignments}개</p>
                    </div>
                    <div class="text-center">
                        <p class="text-sm text-gray-600">완료</p>
                        <p class="text-2xl font-bold text-green-600">${stats.completed_count}개</p>
                    </div>
                    <div class="text-center">
                        <p class="text-sm text-gray-600">평균 점수</p>
                        <p class="text-2xl font-bold text-purple-600">${stats.avg_score}점</p>
                    </div>
                </div>
            `;

            const assignmentsHTML = assignments.map(a => {
                const statusBadge = getStatusBadge(a.status);
                const typeBadge = getTypeBadge(a.assignment_type);
                
                return `
                    <div class="border rounded-lg p-6 mb-4 hover:shadow-lg transition-shadow">
                        <div class="flex items-start justify-between mb-4">
                            <div class="flex-1">
                                <div class="flex items-center gap-3 mb-2">
                                    <h3 class="text-lg font-bold">${a.title}</h3>
                                    ${typeBadge}
                                    ${statusBadge}
                                </div>
                                <p class="text-sm text-gray-600">제출: ${new Date(a.submitted_at).toLocaleString('ko-KR')}</p>
                            </div>
                            ${a.feedback ? `<div class="text-right"><div class="text-3xl font-bold text-purple-600">${a.feedback.score}점</div></div>` : ''}
                        </div>
                        
                        <p class="text-gray-700 mb-4 line-clamp-3">${a.content}</p>
                        
                        ${a.feedback ? `
                            <div class="bg-gray-50 rounded-lg p-4 space-y-3">
                                <div>
                                    <h4 class="font-bold text-green-600 mb-2"><i class="fas fa-thumbs-up mr-2"></i>강점</h4>
                                    <ul class="text-sm space-y-1">
                                        ${a.feedback.strengths.map(s => `<li>• ${s}</li>`).join('')}
                                    </ul>
                                </div>
                                <div>
                                    <h4 class="font-bold text-yellow-600 mb-2"><i class="fas fa-chart-line mr-2"></i>개선사항</h4>
                                    <ul class="text-sm space-y-1">
                                        ${a.feedback.improvements.map(i => `<li>• ${i}</li>`).join('')}
                                    </ul>
                                </div>
                                <div>
                                    <h4 class="font-bold text-blue-600 mb-2"><i class="fas fa-magic mr-2"></i>제안</h4>
                                    <ul class="text-sm space-y-1">
                                        ${a.feedback.suggestions.map(s => `<li>• ${s}</li>`).join('')}
                                    </ul>
                                </div>
                            </div>
                        ` : a.status === 'reviewing' ? `
                            <div class="bg-blue-50 text-blue-700 p-4 rounded-lg text-center">
                                <i class="fas fa-spinner fa-spin mr-2"></i>AI가 피드백을 생성 중입니다...
                            </div>
                        ` : ''}
                    </div>
                `;
            }).join('');

            listDiv.innerHTML = statsHTML + assignmentsHTML;
        }

        function getStatusBadge(status) {
            const badges = {
                'submitted': '<span class="bg-gray-100 text-gray-800 px-3 py-1 rounded-full text-sm">제출됨</span>',
                'reviewing': '<span class="bg-blue-100 text-blue-800 px-3 py-1 rounded-full text-sm"><i class="fas fa-spinner fa-spin mr-1"></i>검토 중</span>',
                'completed': '<span class="bg-green-100 text-green-800 px-3 py-1 rounded-full text-sm"><i class="fas fa-check mr-1"></i>완료</span>',
                'rejected': '<span class="bg-red-100 text-red-800 px-3 py-1 rounded-full text-sm">거부됨</span>'
            };
            return badges[status] || badges['submitted'];
        }

        function getTypeBadge(type) {
            const badges = {
                'resume': '<span class="bg-purple-100 text-purple-800 px-2 py-1 rounded text-xs">이력서</span>',
                'cover_letter': '<span class="bg-pink-100 text-pink-800 px-2 py-1 rounded text-xs">자기소개서</span>',
                'interview_prep': '<span class="bg-blue-100 text-blue-800 px-2 py-1 rounded text-xs">면접</span>',
                'skill_test': '<span class="bg-green-100 text-green-800 px-2 py-1 rounded text-xs">기술</span>',
                'custom': '<span class="bg-gray-100 text-gray-800 px-2 py-1 rounded text-xs">기타</span>'
            };
            return badges[type] || badges['custom'];
        }

        function showError(message) {
            document.getElementById('assignmentList').innerHTML = `
                <div class="text-center py-12">
                    <i class="fas fa-exclamation-triangle text-6xl text-red-300 mb-4"></i>
                    <p class="text-red-500 text-lg">${message}</p>
                    <button onclick="loadAssignments()" class="mt-4 bg-purple-600 text-white px-6 py-3 rounded-lg hover:bg-purple-700 transition-colors">
                        다시 시도
                    </button>
                </div>
            `;
        }

        // 페이지 로드 시 과제 목록 로드
        loadAssignments();
    </script>
</body>
</html>
