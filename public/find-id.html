<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>아이디 찾기 - 알비</title>
  <link href="/styles.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Pretendard', 'Apple SD Gothic Neo', sans-serif;
      background: #f8f9fa;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    
    .find-container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
    }
    
    .find-header {
      text-align: center;
      margin-bottom: 32px;
    }
    
    .find-icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 16px;
      background: linear-gradient(135deg, #FF6B35 0%, #FF8856 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .find-icon i {
      font-size: 32px;
      color: white;
    }
    
    .find-title {
      font-size: 24px;
      font-weight: 700;
      color: #222;
      margin-bottom: 8px;
    }
    
    .find-subtitle {
      font-size: 14px;
      color: #666;
      line-height: 1.6;
    }
    
    .form-group {
      margin-bottom: 20px;
    }
    
    .form-label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: #333;
      margin-bottom: 8px;
    }
    
    .form-input {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 15px;
      transition: all 0.2s;
      box-sizing: border-box;
    }
    
    .form-input:focus {
      outline: none;
      border-color: #FF6B35;
      box-shadow: 0 0 0 3px rgba(255,107,53,0.1);
    }
    
    .btn-find {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #FF6B35 0%, #FF8856 100%);
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 12px;
    }
    
    .btn-find:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(255,107,53,0.3);
    }
    
    .btn-find:active {
      transform: translateY(0);
    }
    
    .btn-back {
      width: 100%;
      padding: 16px;
      background: white;
      color: #FF6B35;
      border: 1px solid #FF6B35;
      border-radius: 6px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .btn-back:hover {
      background: #FFF5F2;
    }
    
    .result-box {
      display: none;
      padding: 24px;
      background: #f0f9ff;
      border: 1px solid #bae6fd;
      border-radius: 8px;
      margin-bottom: 20px;
      text-align: center;
    }
    
    .result-box.success {
      background: #f0fdf4;
      border-color: #86efac;
    }
    
    .result-box.error {
      background: #fef2f2;
      border-color: #fca5a5;
    }
    
    .result-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }
    
    .result-title {
      font-size: 18px;
      font-weight: 700;
      color: #222;
      margin-bottom: 8px;
    }
    
    .result-content {
      font-size: 15px;
      color: #555;
      line-height: 1.6;
    }
    
    .result-username {
      display: inline-block;
      padding: 8px 16px;
      background: white;
      border: 1px solid #0ea5e9;
      border-radius: 6px;
      font-size: 18px;
      font-weight: 700;
      color: #0369a1;
      margin: 12px 0;
    }
    
    .link-group {
      display: flex;
      gap: 12px;
      margin-top: 20px;
    }
    
    .link-group a {
      flex: 1;
      text-align: center;
      padding: 12px;
      background: white;
      border: 1px solid #ddd;
      border-radius: 6px;
      color: #555;
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.2s;
    }
    
    .link-group a:hover {
      background: #f8f9fa;
      border-color: #FF6B35;
      color: #FF6B35;
    }
  </style>
</head>
<body>
  <div class="find-container">
    <div class="find-header">
      <div class="find-icon">
        <i class="fas fa-user-circle"></i>
      </div>
      <h1 class="find-title">이메일 찾기</h1>
      <p class="find-subtitle">
        회원가입 시 등록한 정보를 입력하고<br>
        휴대폰 인증을 완료하시면 이메일을 찾아드립니다.
      </p>
    </div>
    
    <!-- 결과 표시 영역 -->
    <div id="resultBox" class="result-box"></div>
    
    <!-- Step 1: 이름 + 휴대폰 입력 -->
    <form id="findIdForm" style="display: block;">
      <div class="form-group">
        <label class="form-label">이름</label>
        <input 
          type="text" 
          id="name" 
          class="form-input" 
          placeholder="홍길동"
          required
        >
      </div>
      
      <div class="form-group">
        <label class="form-label">휴대폰 번호</label>
        <input 
          type="tel" 
          id="phone" 
          class="form-input" 
          placeholder="010-1234-5678"
          required
        >
      </div>
      
      <button type="submit" class="btn-find">인증번호 받기</button>
      <button type="button" class="btn-back" onclick="location.href='/login.html'">
        로그인으로 돌아가기
      </button>
    </form>

    <!-- Step 2: 인증번호 입력 -->
    <form id="verifyForm" style="display: none;">
      <div class="form-group">
        <label class="form-label">인증번호</label>
        <input 
          type="text" 
          id="verificationCode" 
          class="form-input" 
          placeholder="6자리 숫자 입력"
          maxlength="6"
          required
        >
        <div style="margin-top: 8px; font-size: 14px; color: #FF6B35;" id="timer"></div>
      </div>
      
      <button type="submit" class="btn-find">인증 확인</button>
      <button type="button" class="btn-back" id="resendBtn" style="margin-top: 12px; background: #f8f9fa; color: #333;">
        인증번호 재발송
      </button>
    </form>
  </div>
  
  <script>
    console.log('📧 이메일 찾기 페이지 로드');

    let verificationToken = null;
    let timerInterval = null;
    let timeLeft = 180; // 3분

    // 타이머 시작
    function startTimer() {
      clearInterval(timerInterval);
      timeLeft = 180;
      
      timerInterval = setInterval(() => {
        timeLeft--;
        
        const minutes = Math.floor(timeLeft / 60);
        const seconds = timeLeft % 60;
        document.getElementById('timer').textContent = 
          `남은 시간: ${minutes}:${seconds.toString().padStart(2, '0')}`;
        
        if (timeLeft <= 0) {
          clearInterval(timerInterval);
          alert('인증 시간이 만료되었습니다. 다시 시도해주세요.');
          window.location.reload();
        }
      }, 1000);
    }

    // Step 1: 이름 + 휴대폰 → 인증번호 발송
    document.getElementById('findIdForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const name = document.getElementById('name').value.trim();
      const phone = document.getElementById('phone').value.trim();
      
      console.log('📝 인증번호 발송 요청:', { name, phone });
      
      const submitButton = e.target.querySelector('button[type="submit"]');
      submitButton.disabled = true;
      submitButton.textContent = '발송 중...';
      
      try {
        const response = await fetch('/api/auth/find-email', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ name, phone })
        });
        
        const data = await response.json();
        console.log('📦 API 응답:', data);
        
        if (data.success) {
          verificationToken = data.token;
          
          // Step 2로 이동
          document.getElementById('findIdForm').style.display = 'none';
          document.getElementById('verifyForm').style.display = 'block';
          
          startTimer();
          alert('인증번호가 휴대폰으로 발송되었습니다!');
        } else {
          alert(data.error || '사용자를 찾을 수 없습니다');
          submitButton.disabled = false;
          submitButton.textContent = '인증번호 받기';
        }
      } catch (error) {
        console.error('❌ 에러:', error);
        alert('인증번호 발송 중 오류가 발생했습니다');
        submitButton.disabled = false;
        submitButton.textContent = '인증번호 받기';
      }
    });

    // Step 2: 인증번호 확인
    document.getElementById('verifyForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const code = document.getElementById('verificationCode').value.trim();
      
      console.log('🔐 인증번호 확인:', { code, verificationToken });
      
      const submitButton = e.target.querySelector('button[type="submit"]');
      submitButton.disabled = true;
      submitButton.textContent = '확인 중...';
      
      try {
        const response = await fetch('/api/auth/verify-find-email', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ 
            token: verificationToken,
            code 
          })
        });
        
        const data = await response.json();
        console.log('📦 API 응답:', data);
        
        if (data.success && data.email) {
          clearInterval(timerInterval);
          
          // 결과 표시
          const resultBox = document.getElementById('resultBox');
          resultBox.className = 'result-box success';
          resultBox.style.display = 'block';
          resultBox.innerHTML = `
            <div class="result-icon">✅</div>
            <div class="result-title">이메일을 찾았습니다!</div>
            <div class="result-content">
              회원님의 이메일은
              <div class="result-username">${data.email}</div>
              입니다.
            </div>
            <div class="link-group">
              <a href="/find-password.html">비밀번호 찾기</a>
              <a href="/login.html">로그인하기</a>
            </div>
          `;
          
          document.getElementById('verifyForm').style.display = 'none';
        } else {
          alert(data.error || '인증번호가 일치하지 않습니다');
          submitButton.disabled = false;
          submitButton.textContent = '인증 확인';
        }
      } catch (error) {
        console.error('❌ 에러:', error);
        alert('인증번호 확인 중 오류가 발생했습니다');
        submitButton.disabled = false;
        submitButton.textContent = '인증 확인';
      }
    });

    // 인증번호 재발송
    document.getElementById('resendBtn').addEventListener('click', () => {
      document.getElementById('findIdForm').dispatchEvent(new Event('submit'));
    });
    
    // 전화번호 자동 포맷팅
    document.getElementById('phone').addEventListener('input', (e) => {
      let value = e.target.value.replace(/[^0-9]/g, '');
      
      if (value.length <= 3) {
        e.target.value = value;
      } else if (value.length <= 7) {
        e.target.value = value.slice(0, 3) + '-' + value.slice(3);
      } else {
        e.target.value = value.slice(0, 3) + '-' + value.slice(3, 7) + '-' + value.slice(7, 11);
      }
    });
  </script>
</body>
</html>
