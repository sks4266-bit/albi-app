<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>내 체험 - 알비</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet">
  <link href="/footer.css" rel="stylesheet">
</head>
<body class="bg-gray-50">
  <div class="max-w-4xl mx-auto min-h-screen bg-white shadow-lg">
    <!-- 헤더 -->
    <div class="sticky top-0 bg-white z-50 px-6 py-4 border-b flex items-center justify-between">
      <div class="flex items-center space-x-4">
        <button onclick="history.back()" class="text-gray-600 hover:text-gray-800">
          <i class="fas fa-arrow-left mr-2"></i>뒤로
        </button>
        <h1 class="font-bold text-xl">내 체험</h1>
      </div>
      <a href="/mypage.html" class="text-gray-600 hover:text-gray-800">
        <i class="fas fa-user-circle text-2xl"></i>
      </a>
    </div>

    <!-- 탭 -->
    <div class="border-b">
      <div class="flex">
        <button onclick="showTab('jobseeker')" id="tabJobseeker" 
                class="flex-1 py-4 px-6 font-medium border-b-2 border-orange-500 text-orange-600">
          <i class="fas fa-user mr-2"></i>
          내가 신청한 체험
        </button>
        <button onclick="showTab('employer')" id="tabEmployer"
                class="flex-1 py-4 px-6 font-medium border-b-2 border-transparent text-gray-500 hover:text-gray-700">
          <i class="fas fa-briefcase mr-2"></i>
          받은 체험 신청
        </button>
      </div>
    </div>

    <!-- 구직자 탭 (내가 신청한 체험) -->
    <div id="contentJobseeker" class="p-6">
      <div id="jobseekerExperiences">
        <div class="text-center py-20">
          <i class="fas fa-spinner fa-spin text-4xl text-orange-500 mb-4"></i>
          <p class="text-gray-600">체험 내역을 불러오는 중...</p>
        </div>
      </div>
    </div>

    <!-- 구인자 탭 (받은 체험 신청) -->
    <div id="contentEmployer" class="p-6 hidden">
      <div id="employerExperiences">
        <div class="text-center py-20">
          <i class="fas fa-spinner fa-spin text-4xl text-orange-500 mb-4"></i>
          <p class="text-gray-600">체험 신청을 불러오는 중...</p>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/axios@1.6.0/dist/axios.min.js"></script>
  <script>
    let currentTab = 'jobseeker';
    const sessionToken = localStorage.getItem('albi_session_token');
    const userType = localStorage.getItem('albi_user_type') || 'jobseeker';

    window.onload = function() {
      if (!sessionToken) {
        alert('로그인이 필요합니다.');
        window.location.href = '/login.html';
        return;
      }

      // 사용자 타입에 따라 기본 탭 설정
      if (userType === 'employer') {
        showTab('employer');
      } else {
        showTab('jobseeker');
      }
    };

    function showTab(tab) {
      currentTab = tab;

      // 탭 버튼 스타일
      const jobseekerTab = document.getElementById('tabJobseeker');
      const employerTab = document.getElementById('tabEmployer');
      const jobseekerContent = document.getElementById('contentJobseeker');
      const employerContent = document.getElementById('contentEmployer');

      if (tab === 'jobseeker') {
        jobseekerTab.className = 'flex-1 py-4 px-6 font-medium border-b-2 border-orange-500 text-orange-600';
        employerTab.className = 'flex-1 py-4 px-6 font-medium border-b-2 border-transparent text-gray-500 hover:text-gray-700';
        jobseekerContent.classList.remove('hidden');
        employerContent.classList.add('hidden');
        loadJobseekerExperiences();
      } else {
        employerTab.className = 'flex-1 py-4 px-6 font-medium border-b-2 border-orange-500 text-orange-600';
        jobseekerTab.className = 'flex-1 py-4 px-6 font-medium border-b-2 border-transparent text-gray-500 hover:text-gray-700';
        employerContent.classList.remove('hidden');
        jobseekerContent.classList.add('hidden');
        loadEmployerExperiences();
      }
    }

    // 구직자: 내가 신청한 체험 목록
    async function loadJobseekerExperiences() {
      const container = document.getElementById('jobseekerExperiences');
      
      try {
        const response = await axios.get('/api/experiences/my', {
          headers: {
            'Authorization': `Bearer ${sessionToken}`
          }
        });

        if (response.data.success && response.data.experiences.length > 0) {
          container.innerHTML = response.data.experiences.map(exp => renderJobseekerCard(exp)).join('');
        } else {
          container.innerHTML = `
            <div class="text-center py-20">
              <div class="text-6xl mb-4">👀</div>
              <p class="text-gray-600 text-lg mb-2">아직 신청한 체험이 없습니다</p>
              <p class="text-gray-500 text-sm mb-6">관심있는 공고에 1시간 체험을 신청해보세요!</p>
              <a href="/jobs.html" class="inline-block bg-orange-500 text-white px-6 py-3 rounded-lg font-medium hover:bg-orange-600 transition">
                <i class="fas fa-search mr-2"></i>공고 찾아보기
              </a>
            </div>
          `;
        }
      } catch (error) {
        console.error('체험 목록 조회 에러:', error);
        container.innerHTML = `
          <div class="text-center py-20">
            <i class="fas fa-exclamation-circle text-4xl text-red-500 mb-4"></i>
            <p class="text-gray-600">체험 목록을 불러올 수 없습니다.</p>
          </div>
        `;
      }
    }

    function renderJobseekerCard(exp) {
      const statusConfig = {
        pending: { bg: 'bg-yellow-50', border: 'border-yellow-200', text: 'text-yellow-800', icon: 'fa-clock', label: '승인 대기' },
        approved: { bg: 'bg-green-50', border: 'border-green-200', text: 'text-green-800', icon: 'fa-check-circle', label: '승인 완료' },
        rejected: { bg: 'bg-red-50', border: 'border-red-200', text: 'text-red-800', icon: 'fa-times-circle', label: '거절됨' },
        completed: { bg: 'bg-blue-50', border: 'border-blue-200', text: 'text-blue-800', icon: 'fa-flag-checkered', label: '체험 완료' },
        cancelled: { bg: 'bg-gray-50', border: 'border-gray-200', text: 'text-gray-600', icon: 'fa-ban', label: '취소됨' }
      };

      const status = statusConfig[exp.status] || statusConfig.pending;
      const date = new Date(exp.requested_date).toLocaleDateString('ko-KR', { month: 'long', day: 'numeric', weekday: 'short' });

      return `
        <div class="bg-white border border-gray-200 rounded-2xl p-6 mb-4 hover:shadow-lg transition">
          <div class="flex items-start justify-between mb-4">
            <div class="flex-1">
              <h3 class="text-lg font-bold text-gray-900 mb-2">${exp.job_title || '공고 정보 없음'}</h3>
              <div class="flex items-center space-x-3 text-sm text-gray-600">
                <span><i class="fas fa-calendar mr-1"></i>${date}</span>
                <span><i class="fas fa-clock mr-1"></i>${exp.requested_time}</span>
              </div>
            </div>
            <div class="${status.bg} ${status.border} ${status.text} px-4 py-2 rounded-lg border flex items-center space-x-2">
              <i class="fas ${status.icon}"></i>
              <span class="font-medium">${status.label}</span>
            </div>
          </div>

          ${exp.message ? `
          <div class="bg-gray-50 rounded-lg p-3 mb-4">
            <p class="text-sm text-gray-700">"${exp.message}"</p>
          </div>
          ` : ''}

          ${exp.rejection_reason ? `
          <div class="${status.bg} border ${status.border} rounded-lg p-3 mb-4">
            <p class="text-sm ${status.text} font-medium mb-1">사업주 답변:</p>
            <p class="text-sm text-gray-700">${exp.rejection_reason}</p>
          </div>
          ` : ''}

          <div class="flex items-center justify-between pt-4 border-t border-gray-200">
            <div class="text-xs text-gray-500">
              신청일: ${new Date(exp.created_at).toLocaleDateString('ko-KR')}
            </div>
            <div class="flex space-x-2">
              ${exp.status === 'pending' ? `
                <button onclick="cancelExperience('${exp.id}')" 
                        class="px-4 py-2 bg-gray-200 text-gray-700 rounded-lg text-sm font-medium hover:bg-gray-300 transition">
                  <i class="fas fa-ban mr-1"></i>취소
                </button>
              ` : ''}
              ${exp.status === 'approved' ? `
                <a href="/job-detail.html?id=${exp.job_id}" 
                   class="px-4 py-2 bg-orange-500 text-white rounded-lg text-sm font-medium hover:bg-orange-600 transition">
                  <i class="fas fa-info-circle mr-1"></i>공고 보기
                </a>
              ` : ''}
            </div>
          </div>
        </div>
      `;
    }

    // 구인자: 받은 체험 신청 목록
    async function loadEmployerExperiences() {
      const container = document.getElementById('employerExperiences');
      
      try {
        const response = await axios.get('/api/experiences/received', {
          headers: {
            'Authorization': `Bearer ${sessionToken}`
          }
        });

        if (response.data.success && response.data.experiences.length > 0) {
          container.innerHTML = response.data.experiences.map(exp => renderEmployerCard(exp)).join('');
        } else {
          container.innerHTML = `
            <div class="text-center py-20">
              <div class="text-6xl mb-4">📭</div>
              <p class="text-gray-600 text-lg mb-2">받은 체험 신청이 없습니다</p>
              <p class="text-gray-500 text-sm mb-6">공고를 등록하면 구직자가 체험을 신청합니다!</p>
              <a href="/job-post.html" class="inline-block bg-orange-500 text-white px-6 py-3 rounded-lg font-medium hover:bg-orange-600 transition">
                <i class="fas fa-plus mr-2"></i>공고 등록하기
              </a>
            </div>
          `;
        }
      } catch (error) {
        console.error('체험 신청 조회 에러:', error);
        container.innerHTML = `
          <div class="text-center py-20">
            <i class="fas fa-exclamation-circle text-4xl text-red-500 mb-4"></i>
            <p class="text-gray-600">체험 신청을 불러올 수 없습니다.</p>
          </div>
        `;
      }
    }

    function renderEmployerCard(exp) {
      const statusConfig = {
        pending: { bg: 'bg-yellow-50', border: 'border-yellow-200', text: 'text-yellow-800', icon: 'fa-clock', label: '승인 대기' },
        approved: { bg: 'bg-green-50', border: 'border-green-200', text: 'text-green-800', icon: 'fa-check-circle', label: '승인 완료' },
        rejected: { bg: 'bg-red-50', border: 'border-red-200', text: 'text-red-800', icon: 'fa-times-circle', label: '거절됨' },
        completed: { bg: 'bg-blue-50', border: 'border-blue-200', text: 'text-blue-800', icon: 'fa-flag-checkered', label: '체험 완료' },
        cancelled: { bg: 'bg-gray-50', border: 'border-gray-200', text: 'text-gray-600', icon: 'fa-ban', label: '취소됨' }
      };

      const status = statusConfig[exp.status] || statusConfig.pending;
      const date = new Date(exp.scheduled_date).toLocaleDateString('ko-KR', { month: 'long', day: 'numeric', weekday: 'short' });

      return `
        <div class="bg-white border border-gray-200 rounded-2xl p-6 mb-4 hover:shadow-lg transition">
          <div class="flex items-start justify-between mb-4">
            <div class="flex-1">
              <div class="flex items-center space-x-3 mb-2">
                <div class="w-12 h-12 bg-orange-100 rounded-full flex items-center justify-center">
                  <i class="fas fa-user text-orange-600 text-xl"></i>
                </div>
                <div>
                  <h3 class="text-lg font-bold text-gray-900">${exp.jobseeker_name || '구직자'}</h3>
                  <p class="text-sm text-gray-600">${exp.job_title}</p>
                </div>
              </div>
              <div class="flex items-center space-x-3 text-sm text-gray-600 ml-15">
                <span><i class="fas fa-calendar mr-1"></i>${date}</span>
                <span><i class="fas fa-clock mr-1"></i>${exp.scheduled_time}</span>
              </div>
            </div>
            <div class="${status.bg} ${status.border} ${status.text} px-4 py-2 rounded-lg border flex items-center space-x-2">
              <i class="fas ${status.icon}"></i>
              <span class="font-medium">${status.label}</span>
            </div>
          </div>

          ${exp.jobseeker_message ? `
          <div class="bg-blue-50 border border-blue-200 rounded-lg p-3 mb-4">
            <p class="text-sm text-blue-800 font-medium mb-1">요청 사항:</p>
            <p class="text-sm text-gray-700">"${exp.jobseeker_message}"</p>
          </div>
          ` : ''}

          ${exp.employer_response ? `
          <div class="${status.bg} border ${status.border} rounded-lg p-3 mb-4">
            <p class="text-sm ${status.text} font-medium mb-1">내 답변:</p>
            <p class="text-sm text-gray-700">${exp.employer_response}</p>
          </div>
          ` : ''}

          <div class="flex items-center justify-between pt-4 border-t border-gray-200">
            <div class="text-xs text-gray-500">
              신청일: ${new Date(exp.created_at).toLocaleDateString('ko-KR')}
            </div>
            <div class="flex space-x-2">
              ${exp.status === 'pending' ? `
                <button onclick="approveExperience('${exp.id}')" 
                        class="px-4 py-2 bg-green-500 text-white rounded-lg text-sm font-medium hover:bg-green-600 transition">
                  <i class="fas fa-check mr-1"></i>승인
                </button>
                <button onclick="rejectExperience('${exp.id}')" 
                        class="px-4 py-2 bg-red-500 text-white rounded-lg text-sm font-medium hover:bg-red-600 transition">
                  <i class="fas fa-times mr-1"></i>거절
                </button>
              ` : ''}
              ${exp.status === 'approved' ? `
                <button onclick="completeExperience('${exp.id}')" 
                        class="px-4 py-2 bg-blue-500 text-white rounded-lg text-sm font-medium hover:bg-blue-600 transition">
                  <i class="fas fa-flag-checkered mr-1"></i>체험 완료
                </button>
              ` : ''}
            </div>
          </div>
        </div>
      `;
    }

    // 체험 취소 (구직자)
    async function cancelExperience(id) {
      if (!confirm('정말 체험 신청을 취소하시겠습니까?')) return;

      try {
        const response = await axios.put(`/api/experiences/${id}/cancel`, {}, {
          headers: {
            'Authorization': `Bearer ${sessionToken}`,
            'Content-Type': 'application/json'
          }
        });

        if (response.data.success) {
          alert('✅ 체험 신청이 취소되었습니다.');
          loadJobseekerExperiences();
        }
      } catch (error) {
        console.error('체험 취소 에러:', error);
        alert('❌ 체험 취소에 실패했습니다.');
      }
    }

    // 체험 승인 (구인자)
    async function approveExperience(id) {
      const message = prompt('승인 메시지를 입력하세요 (선택):', '체험 신청이 승인되었습니다. 약속 시간에 만나요!');
      
      try {
        const response = await axios.put(`/api/experiences/${id}/approve`, {}, {
          headers: {
            'Authorization': `Bearer ${sessionToken}`,
            'Content-Type': 'application/json'
          }
        });

        if (response.data.success) {
          alert('✅ 체험 신청을 승인했습니다.');
          loadEmployerExperiences();
        }
      } catch (error) {
        console.error('체험 승인 에러:', error);
        alert('❌ 체험 승인에 실패했습니다.');
      }
    }

    // 체험 거절 (구인자)
    async function rejectExperience(id) {
      const reason = prompt('거절 사유를 입력하세요 (필수):', '');
      
      if (!reason || reason.trim() === '') {
        alert('거절 사유를 입력해주세요.');
        return;
      }

      try {
        const response = await axios.put(`/api/experiences/${id}/reject`, {
          rejection_reason: reason
        }, {
          headers: {
            'Authorization': `Bearer ${sessionToken}`,
            'Content-Type': 'application/json'
          }
        });

        if (response.data.success) {
          alert('✅ 체험 신청을 거절했습니다.');
          loadEmployerExperiences();
        }
      } catch (error) {
        console.error('체험 거절 에러:', error);
        alert('❌ 체험 거절에 실패했습니다.');
      }
    }

    // 체험 완료 (구인자)
    async function completeExperience(id) {
      if (!confirm('체험이 완료되었나요?')) return;

      try {
        const response = await axios.put(`/api/experiences/${id}`, {
          status: 'completed'
        }, {
          headers: {
            'Authorization': `Bearer ${sessionToken}`,
            'Content-Type': 'application/json'
          }
        });

        if (response.data.success) {
          alert('✅ 체험이 완료되었습니다!');
          loadEmployerExperiences();
        }
      } catch (error) {
        console.error('체험 완료 에러:', error);
        alert('❌ 체험 완료 처리에 실패했습니다.');
      }
    }
  </script>
  <div id="footer-container"></div>
  <script src="/footer.js"></script>
</body>
</html>
