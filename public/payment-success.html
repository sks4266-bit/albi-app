<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✅ 결제 완료 - Albi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50">
    <div class="max-w-2xl mx-auto p-6 flex items-center justify-center min-h-screen">
        <div class="bg-white rounded-2xl shadow-lg p-8 text-center w-full" id="loadingContainer">
            <div class="animate-spin rounded-full h-16 w-16 border-b-2 border-blue-600 mx-auto mb-4"></div>
            <p class="text-gray-600">결제를 확인하는 중...</p>
        </div>

        <div class="bg-white rounded-2xl shadow-lg p-8 text-center w-full hidden" id="successContainer">
            <div class="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-6">
                <i class="fas fa-check text-green-600 text-4xl"></i>
            </div>
            <h1 class="text-3xl font-bold text-gray-800 mb-4">결제가 완료되었습니다!</h1>
            <p class="text-gray-600 mb-2">AI 멘토 프리미엄 구독이 시작되었습니다.</p>
            <p class="text-sm text-blue-600 mb-6">🚀 3초 후 AI 멘토 채팅으로 자동 이동합니다...</p>

            <div class="bg-gray-50 rounded-lg p-6 mb-6 text-left">
                <div class="flex justify-between mb-3">
                    <span class="text-gray-600">결제 금액</span>
                    <span class="font-semibold text-gray-800" id="paymentAmount">₩4,900</span>
                </div>
                <div class="flex justify-between mb-3">
                    <span class="text-gray-600">구독 기간</span>
                    <span class="font-semibold text-gray-800">30일</span>
                </div>
                <div class="flex justify-between">
                    <span class="text-gray-600">만료 일자</span>
                    <span class="font-semibold text-gray-800" id="expiresAt">-</span>
                </div>
            </div>

            <a href="/mentor-chat.html" 
               class="inline-block w-full bg-gradient-to-r from-blue-600 to-purple-600 text-white font-bold py-4 rounded-lg hover:from-blue-700 hover:to-purple-700 transition duration-200 mb-3">
                <i class="fas fa-comments mr-2"></i>AI 멘토 시작하기
            </a>

            <a href="/chat.html" 
               class="inline-block w-full bg-gray-200 text-gray-700 font-semibold py-4 rounded-lg hover:bg-gray-300 transition duration-200">
                <i class="fas fa-home mr-2"></i>홈으로 돌아가기
            </a>
        </div>

        <div class="bg-white rounded-2xl shadow-lg p-8 text-center w-full hidden" id="errorContainer">
            <div class="w-20 h-20 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-6">
                <i class="fas fa-times text-red-600 text-4xl"></i>
            </div>
            <h1 class="text-3xl font-bold text-gray-800 mb-4">결제 승인 실패</h1>
            <p class="text-gray-600 mb-8" id="errorMessage">결제 승인 중 문제가 발생했습니다.</p>

            <a href="/payment.html" 
               class="inline-block w-full bg-blue-600 text-white font-bold py-4 rounded-lg hover:bg-blue-700 transition duration-200 mb-3">
                <i class="fas fa-redo mr-2"></i>다시 시도하기
            </a>

            <a href="/chat.html" 
               class="inline-block w-full bg-gray-200 text-gray-700 font-semibold py-4 rounded-lg hover:bg-gray-300 transition duration-200">
                <i class="fas fa-home mr-2"></i>홈으로 돌아가기
            </a>
        </div>
    </div>

    <script>
        // URL 파라미터에서 결제 정보 추출
        const urlParams = new URLSearchParams(window.location.search);
        const paymentKey = urlParams.get('paymentKey');
        const orderId = urlParams.get('orderId');
        const amount = urlParams.get('amount');

        async function confirmPayment() {
            if (!paymentKey || !orderId || !amount) {
                showError('결제 정보가 올바르지 않습니다.');
                return;
            }

            try {
                // 서버에 결제 승인 요청
                const response = await fetch('/api/payment-confirm', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        payment_key: paymentKey,
                        order_id: orderId,
                        amount: parseInt(amount)
                    })
                });

                const result = await response.json();

                if (result.success) {
                    showSuccess(result.data);
                } else {
                    showError(result.message || '결제 승인에 실패했습니다.');
                }

            } catch (error) {
                console.error('❌ Confirm error:', error);
                showError('결제 승인 처리 중 오류가 발생했습니다.');
            }
        }

        function showSuccess(data) {
            document.getElementById('loadingContainer').classList.add('hidden');
            document.getElementById('successContainer').classList.remove('hidden');
            
            document.getElementById('paymentAmount').textContent = '₩' + data.amount.toLocaleString();
            
            const expiresDate = new Date(data.expires_at);
            document.getElementById('expiresAt').textContent = expiresDate.toLocaleDateString('ko-KR');
            
            // 3초 후 자동으로 멘토 채팅으로 이동
            setTimeout(() => {
                window.location.href = '/mentor-chat.html';
            }, 3000);
        }

        function showError(message) {
            document.getElementById('loadingContainer').classList.add('hidden');
            document.getElementById('errorContainer').classList.remove('hidden');
            document.getElementById('errorMessage').textContent = message;
        }

        // 페이지 로드 시 자동으로 결제 승인 요청
        confirmPayment();
    </script>
</body>
</html>
