<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔐 관리자 로그인 - Albi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gradient-to-br from-blue-500 to-purple-600 min-h-screen flex items-center justify-center">
    <div class="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-md">
        <!-- Logo -->
        <div class="text-center mb-8">
            <div class="bg-blue-100 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="fas fa-shield-alt text-4xl text-blue-600"></i>
            </div>
            <h1 class="text-3xl font-bold text-gray-800">관리자 로그인</h1>
            <p class="text-gray-600 mt-2">Albi AI 면접 시스템</p>
        </div>

        <!-- Login Form -->
        <form id="loginForm" class="space-y-6">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">
                    <i class="fas fa-lock mr-2"></i>비밀번호
                </label>
                <input 
                    type="password" 
                    id="password" 
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                    placeholder="관리자 비밀번호를 입력하세요"
                    required
                >
            </div>

            <!-- Error Message -->
            <div id="errorMessage" class="hidden bg-red-50 border border-red-200 rounded-lg p-4">
                <div class="flex items-center">
                    <i class="fas fa-exclamation-circle text-red-500 mr-2"></i>
                    <span class="text-red-700 text-sm" id="errorText"></span>
                </div>
            </div>

            <!-- Submit Button -->
            <button 
                type="submit" 
                id="submitBtn"
                class="w-full bg-blue-600 text-white font-semibold py-3 rounded-lg hover:bg-blue-700 transition duration-200 flex items-center justify-center"
            >
                <i class="fas fa-sign-in-alt mr-2"></i>
                로그인
            </button>
        </form>

        <!-- Info -->
        <div class="mt-6 text-center text-sm text-gray-500">
            <p>
                <i class="fas fa-info-circle mr-1"></i>
                기본 비밀번호: <code class="bg-gray-100 px-2 py-1 rounded">albi2024!@#</code>
            </p>
            <p class="mt-2 text-xs">
                프로덕션 환경에서는 Cloudflare secret으로 설정하세요
            </p>
        </div>

        <!-- Links -->
        <div class="mt-8 flex justify-center space-x-4 text-sm">
            <a href="/chat" class="text-blue-600 hover:text-blue-800">
                <i class="fas fa-comments mr-1"></i>면접 페이지
            </a>
            <span class="text-gray-300">|</span>
            <a href="/" class="text-blue-600 hover:text-blue-800">
                <i class="fas fa-home mr-1"></i>홈으로
            </a>
        </div>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const passwordInput = document.getElementById('password');
        const submitBtn = document.getElementById('submitBtn');
        const errorMessage = document.getElementById('errorMessage');
        const errorText = document.getElementById('errorText');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const password = passwordInput.value.trim();
            
            if (!password) {
                showError('비밀번호를 입력해주세요');
                return;
            }

            // Loading state
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>로그인 중...';
            errorMessage.classList.add('hidden');

            try {
                const response = await fetch('/api/admin-auth', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ password })
                });

                const result = await response.json();

                if (result.success) {
                    // 토큰 저장
                    localStorage.setItem('admin_token', result.token);
                    
                    // 성공 메시지
                    submitBtn.innerHTML = '<i class="fas fa-check-circle mr-2"></i>로그인 성공!';
                    submitBtn.classList.remove('bg-blue-600', 'hover:bg-blue-700');
                    submitBtn.classList.add('bg-green-600');
                    
                    // 리디렉트
                    setTimeout(() => {
                        const redirectTo = new URLSearchParams(window.location.search).get('redirect') || '/admin-dashboard.html';
                        window.location.href = redirectTo;
                    }, 1000);
                } else {
                    showError(result.message || '로그인 실패');
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = '<i class="fas fa-sign-in-alt mr-2"></i>로그인';
                }
            } catch (error) {
                console.error('Login error:', error);
                showError('네트워크 오류가 발생했습니다');
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-sign-in-alt mr-2"></i>로그인';
            }
        });

        function showError(message) {
            errorText.textContent = message;
            errorMessage.classList.remove('hidden');
        }

        // Enter key 처리
        passwordInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                loginForm.dispatchEvent(new Event('submit'));
            }
        });

        // 자동 포커스
        passwordInput.focus();

        // 이미 로그인된 경우 리디렉트
        const token = localStorage.getItem('admin_token');
        if (token) {
            fetch('/api/admin-auth', {
                headers: {
                    'Authorization': `Bearer ${token}`
                }
            })
            .then(res => res.json())
            .then(result => {
                if (result.success) {
                    window.location.href = '/admin-dashboard.html';
                }
            })
            .catch(() => {
                // 토큰 무효, 로그인 필요
                localStorage.removeItem('admin_token');
            });
        }
    </script>
</body>
</html>
