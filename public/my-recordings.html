<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내 면접 녹화 목록 | Albi AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet">
    
    <style>
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .recording-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
        }
        
        .recording-card:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }
    </style>
</head>
<body class="gradient-bg min-h-screen text-white">
    <div class="container mx-auto px-4 py-8">
        <!-- 헤더 -->
        <div class="flex items-center justify-between mb-8">
            <div>
                <h1 class="text-4xl font-bold mb-2">
                    <i class="fas fa-video mr-3"></i>내 면접 녹화
                </h1>
                <p class="text-gray-300">과거 면접을 다시 보고 개선하세요</p>
            </div>
            <a href="/video-interview.html" class="bg-purple-600 hover:bg-purple-700 text-white px-6 py-3 rounded-xl font-bold transition-all">
                <i class="fas fa-plus mr-2"></i>새 면접 시작
            </a>
        </div>

        <!-- 통계 카드 -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
            <div class="recording-card rounded-xl p-6">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-300 text-sm mb-1">총 면접 수</p>
                        <p id="totalCount" class="text-3xl font-bold">-</p>
                    </div>
                    <i class="fas fa-video text-4xl text-blue-400"></i>
                </div>
            </div>
            
            <div class="recording-card rounded-xl p-6">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-300 text-sm mb-1">평균 점수</p>
                        <p id="avgScore" class="text-3xl font-bold">-</p>
                    </div>
                    <i class="fas fa-star text-4xl text-yellow-400"></i>
                </div>
            </div>
            
            <div class="recording-card rounded-xl p-6">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-300 text-sm mb-1">최고 점수</p>
                        <p id="maxScore" class="text-3xl font-bold">-</p>
                    </div>
                    <i class="fas fa-trophy text-4xl text-green-400"></i>
                </div>
            </div>
            
            <div class="recording-card rounded-xl p-6">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-300 text-sm mb-1">총 시간</p>
                        <p id="totalTime" class="text-3xl font-bold">-</p>
                    </div>
                    <i class="fas fa-clock text-4xl text-purple-400"></i>
                </div>
            </div>
        </div>

        <!-- 녹화 목록 -->
        <div class="recording-card rounded-xl p-6">
            <h2 class="text-2xl font-bold mb-6">
                <i class="fas fa-list mr-2"></i>면접 기록
            </h2>
            
            <div id="loadingIndicator" class="text-center py-12">
                <i class="fas fa-spinner fa-spin text-4xl text-purple-400 mb-4"></i>
                <p class="text-gray-300">면접 기록을 불러오는 중...</p>
            </div>
            
            <div id="recordingsList" class="space-y-4 hidden">
                <!-- 녹화 목록이 여기에 동적으로 추가됩니다 -->
            </div>
            
            <div id="emptyState" class="text-center py-12 hidden">
                <i class="fas fa-inbox text-6xl text-gray-500 mb-4"></i>
                <p class="text-xl text-gray-400 mb-6">아직 면접 기록이 없습니다</p>
                <a href="/video-interview.html" class="inline-block bg-purple-600 hover:bg-purple-700 text-white px-8 py-3 rounded-xl font-bold transition-all">
                    <i class="fas fa-plus mr-2"></i>첫 면접 시작하기
                </a>
            </div>
        </div>
    </div>

    <script>
        let currentUserId = 'user_demo_001'; // 실제로는 인증 시스템에서 가져옴
        
        // 페이지 로드 시 녹화 목록 가져오기
        async function loadRecordings() {
            try {
                const response = await fetch(`/api/list-recordings?userId=${currentUserId}&limit=20`);
                const data = await response.json();
                
                document.getElementById('loadingIndicator').classList.add('hidden');
                
                if (!data.success || !data.data.recordings || data.data.recordings.length === 0) {
                    document.getElementById('emptyState').classList.remove('hidden');
                    return;
                }
                
                // 통계 업데이트
                updateStatistics(data.data.recordings);
                
                // 목록 렌더링
                renderRecordings(data.data.recordings);
                document.getElementById('recordingsList').classList.remove('hidden');
                
            } catch (error) {
                console.error('Failed to load recordings:', error);
                document.getElementById('loadingIndicator').classList.add('hidden');
                document.getElementById('emptyState').classList.remove('hidden');
            }
        }
        
        // 통계 업데이트
        function updateStatistics(recordings) {
            const totalCount = recordings.length;
            const scores = recordings.filter(r => r.final_score).map(r => r.final_score);
            const avgScore = scores.length > 0 ? Math.round(scores.reduce((a, b) => a + b, 0) / scores.length) : 0;
            const maxScore = scores.length > 0 ? Math.max(...scores) : 0;
            const totalDuration = recordings.reduce((sum, r) => sum + (r.duration || 0), 0);
            const totalMinutes = Math.round(totalDuration / 60);
            
            document.getElementById('totalCount').textContent = totalCount;
            document.getElementById('avgScore').textContent = avgScore;
            document.getElementById('maxScore').textContent = maxScore;
            document.getElementById('totalTime').textContent = `${totalMinutes}분`;
        }
        
        // 녹화 목록 렌더링
        function renderRecordings(recordings) {
            const container = document.getElementById('recordingsList');
            container.innerHTML = '';
            
            recordings.forEach(recording => {
                const card = createRecordingCard(recording);
                container.appendChild(card);
            });
        }
        
        // 녹화 카드 생성
        function createRecordingCard(recording) {
            const div = document.createElement('div');
            div.className = 'bg-gray-800 rounded-lg p-6 flex items-center justify-between hover:bg-gray-750 transition-all';
            
            const date = new Date(recording.created_at).toLocaleString('ko-KR');
            const sizeMB = (recording.size / 1024 / 1024).toFixed(1);
            const durationMin = Math.round(recording.duration / 60);
            
            const gradeColor = {
                'A+': 'text-green-400',
                'A': 'text-green-400',
                'B': 'text-blue-400',
                'C': 'text-yellow-400',
                'D': 'text-red-400'
            }[recording.final_grade] || 'text-gray-400';
            
            div.innerHTML = `
                <div class="flex items-center space-x-6 flex-1">
                    <div class="bg-purple-600 rounded-lg p-4">
                        <i class="fas fa-video text-2xl"></i>
                    </div>
                    <div class="flex-1">
                        <h3 class="text-xl font-bold mb-2">${recording.company_name || '면접 연습'} - ${recording.position || '일반'}</h3>
                        <div class="flex items-center space-x-4 text-sm text-gray-400">
                            <span><i class="fas fa-calendar mr-1"></i>${date}</span>
                            <span><i class="fas fa-clock mr-1"></i>${durationMin}분</span>
                            <span><i class="fas fa-database mr-1"></i>${sizeMB} MB</span>
                            ${recording.final_score ? `
                                <span class="${gradeColor}">
                                    <i class="fas fa-star mr-1"></i>${recording.final_score}점 (${recording.final_grade})
                                </span>
                            ` : ''}
                        </div>
                    </div>
                </div>
                <div class="flex items-center space-x-3">
                    <button onclick="viewRecording('${recording.recording_id}')" 
                            class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg transition-all">
                        <i class="fas fa-play mr-2"></i>재생
                    </button>
                    <button onclick="downloadRecording('${recording.recording_id}')" 
                            class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg transition-all">
                        <i class="fas fa-download"></i>
                    </button>
                    <button onclick="deleteRecording('${recording.recording_id}')" 
                            class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-lg transition-all">
                        <i class="fas fa-trash"></i>
                    </button>
                </div>
            `;
            
            return div;
        }
        
        // 녹화 재생
        function viewRecording(recordingId) {
            // 리플레이 플레이어로 이동
            window.location.href = `/replay.html?id=${recordingId}`;
        }
        
        // 녹화 다운로드
        async function downloadRecording(recordingId) {
            try {
                const url = `/api/download-video?id=${recordingId}`;
                window.open(url, '_blank');
            } catch (error) {
                console.error('Download failed:', error);
                alert('다운로드 실패: ' + error.message);
            }
        }
        
        // 녹화 삭제
        async function deleteRecording(recordingId) {
            if (!confirm('정말 이 면접 기록을 삭제하시겠습니까?')) {
                return;
            }
            
            alert('삭제 기능은 곧 제공됩니다!');
        }
        
        // 페이지 로드 시 실행
        loadRecordings();
    </script>
</body>
</html>
