<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📊 Albi 면접 분석 대시보드</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        .stat-card {
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }
        .chart-container {
            position: relative;
            height: 300px;
        }
        .loading {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body class="bg-gray-50">
    <!-- Auth Check -->
    <script>
        // 관리자 인증 체크
        (function() {
            const token = localStorage.getItem('admin_token');
            if (!token) {
                window.location.href = '/admin-login.html?redirect=' + encodeURIComponent(window.location.pathname);
                return;
            }
            
            // 토큰 유효성 검증
            fetch('/api/admin-auth', {
                headers: {
                    'Authorization': 'Bearer ' + token
                }
            })
            .then(res => res.json())
            .then(result => {
                if (!result.success) {
                    localStorage.removeItem('admin_token');
                    window.location.href = '/admin-login.html?redirect=' + encodeURIComponent(window.location.pathname);
                }
            })
            .catch(() => {
                localStorage.removeItem('admin_token');
                window.location.href = '/admin-login.html?redirect=' + encodeURIComponent(window.location.pathname);
            });
        })();
    </script>
    
    <div class="container mx-auto px-4 py-8 max-w-7xl">
        <!-- Header -->
        <div class="mb-8">
            <div class="flex justify-between items-start">
                <div>
                    <h1 class="text-4xl font-bold text-gray-800 mb-2">
                        <i class="fas fa-chart-line text-blue-600"></i>
                        면접 데이터 분석 대시보드
                    </h1>
                    <p class="text-gray-600">실시간 면접 성과 및 사용자 행동 분석</p>
                    <div class="mt-4 flex items-center space-x-4">
                        <span class="text-sm text-gray-500">
                            <i class="fas fa-clock"></i>
                            마지막 업데이트: <span id="lastUpdate">-</span>
                        </span>
                        <button onclick="loadAnalytics()" class="text-sm text-blue-600 hover:text-blue-800">
                            <i class="fas fa-sync-alt"></i> 새로고침
                        </button>
                        <a href="/session-stats.html" class="text-sm text-gray-600 hover:text-gray-800">
                            <i class="fas fa-server"></i> 세션 모니터링
                        </a>
                        <div class="relative inline-block">
                            <button onclick="toggleExportMenu()" class="px-3 py-1 bg-green-600 text-white text-sm rounded hover:bg-green-700">
                                <i class="fas fa-download mr-1"></i> CSV 내보내기
                            </button>
                            <div id="exportMenu" class="hidden absolute right-0 mt-2 w-56 bg-white rounded-lg shadow-xl border border-gray-200 z-10">
                                <div class="py-2">
                                    <div class="px-4 py-2 text-xs text-gray-500 font-semibold">면접 세션</div>
                                    <button onclick="exportCSV('sessions', 7)" class="w-full text-left px-4 py-2 hover:bg-gray-100 text-sm">
                                        <i class="fas fa-calendar-week mr-2 text-blue-500"></i>최근 7일
                                    </button>
                                    <button onclick="exportCSV('sessions', 30)" class="w-full text-left px-4 py-2 hover:bg-gray-100 text-sm">
                                        <i class="fas fa-calendar-alt mr-2 text-blue-500"></i>최근 30일
                                    </button>
                                    <div class="border-t my-2"></div>
                                    <div class="px-4 py-2 text-xs text-gray-500 font-semibold">대화 내역</div>
                                    <button onclick="exportCSV('conversations', 7)" class="w-full text-left px-4 py-2 hover:bg-gray-100 text-sm">
                                        <i class="fas fa-comments mr-2 text-green-500"></i>최근 7일
                                    </button>
                                    <button onclick="exportCSV('conversations', 30)" class="w-full text-left px-4 py-2 hover:bg-gray-100 text-sm">
                                        <i class="fas fa-comments mr-2 text-green-500"></i>최근 30일
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <button onclick="logout()" class="px-4 py-2 bg-red-500 text-white rounded hover:bg-red-600">
                    <i class="fas fa-sign-out-alt mr-2"></i>로그아웃
                </button>
            </div>
        </div>

        <!-- Loading State -->
        <div id="loadingState" class="text-center py-12">
            <div class="loading inline-block">
                <i class="fas fa-spinner fa-spin text-4xl text-blue-600"></i>
            </div>
            <p class="mt-4 text-gray-600">데이터 분석 중...</p>
        </div>

        <!-- Main Content (Hidden until loaded) -->
        <div id="mainContent" class="hidden">
            <!-- KPI Cards -->
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
                <!-- 완료율 -->
                <div class="stat-card bg-gradient-to-br from-blue-500 to-blue-600 text-white rounded-lg shadow-lg p-6">
                    <div class="flex justify-between items-start">
                        <div>
                            <p class="text-blue-100 text-sm font-medium">면접 완료율</p>
                            <h3 class="text-3xl font-bold mt-2" id="completionRate">-</h3>
                            <p class="text-blue-100 text-xs mt-1" id="completionDetail">-</p>
                        </div>
                        <div class="bg-white bg-opacity-20 rounded-full p-3">
                            <i class="fas fa-check-circle text-2xl"></i>
                        </div>
                    </div>
                </div>

                <!-- 평균 점수 -->
                <div class="stat-card bg-gradient-to-br from-green-500 to-green-600 text-white rounded-lg shadow-lg p-6">
                    <div class="flex justify-between items-start">
                        <div>
                            <p class="text-green-100 text-sm font-medium">평균 점수 (24h)</p>
                            <h3 class="text-3xl font-bold mt-2" id="avgScore">-</h3>
                            <p class="text-green-100 text-xs mt-1" id="avgScoreDetail">-</p>
                        </div>
                        <div class="bg-white bg-opacity-20 rounded-full p-3">
                            <i class="fas fa-star text-2xl"></i>
                        </div>
                    </div>
                </div>

                <!-- 평균 면접 시간 -->
                <div class="stat-card bg-gradient-to-br from-purple-500 to-purple-600 text-white rounded-lg shadow-lg p-6">
                    <div class="flex justify-between items-start">
                        <div>
                            <p class="text-purple-100 text-sm font-medium">평균 면접 시간</p>
                            <h3 class="text-3xl font-bold mt-2" id="avgDuration">-</h3>
                            <p class="text-purple-100 text-xs mt-1" id="avgDurationDetail">-</p>
                        </div>
                        <div class="bg-white bg-opacity-20 rounded-full p-3">
                            <i class="fas fa-clock text-2xl"></i>
                        </div>
                    </div>
                </div>

                <!-- 평균 응답 시간 -->
                <div class="stat-card bg-gradient-to-br from-orange-500 to-orange-600 text-white rounded-lg shadow-lg p-6">
                    <div class="flex justify-between items-start">
                        <div>
                            <p class="text-orange-100 text-sm font-medium">평균 응답 시간</p>
                            <h3 class="text-3xl font-bold mt-2" id="avgResponseTime">-</h3>
                            <p class="text-orange-100 text-xs mt-1">사용자 답변 속도</p>
                        </div>
                        <div class="bg-white bg-opacity-20 rounded-full p-3">
                            <i class="fas fa-bolt text-2xl"></i>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Charts Row 1 -->
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
                <!-- 점수 추이 -->
                <div class="bg-white rounded-lg shadow-lg p-6">
                    <h3 class="text-lg font-bold text-gray-800 mb-4">
                        <i class="fas fa-chart-line text-green-600"></i>
                        평균 점수 추이 (7일)
                    </h3>
                    <div class="chart-container">
                        <canvas id="scoresTrendChart"></canvas>
                    </div>
                </div>

                <!-- 이탈률 분석 -->
                <div class="bg-white rounded-lg shadow-lg p-6">
                    <h3 class="text-lg font-bold text-gray-800 mb-4">
                        <i class="fas fa-user-slash text-red-600"></i>
                        이탈률 분석 (질문 단계별)
                    </h3>
                    <div class="chart-container">
                        <canvas id="dropoffChart"></canvas>
                    </div>
                </div>
            </div>

            <!-- Charts Row 2 -->
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
                <!-- 등급 분포 -->
                <div class="bg-white rounded-lg shadow-lg p-6">
                    <h3 class="text-lg font-bold text-gray-800 mb-4">
                        <i class="fas fa-trophy text-yellow-600"></i>
                        등급 분포 (24시간)
                    </h3>
                    <div class="chart-container">
                        <canvas id="gradeDistChart"></canvas>
                    </div>
                </div>

                <!-- 직무별 성과 -->
                <div class="bg-white rounded-lg shadow-lg p-6">
                    <h3 class="text-lg font-bold text-gray-800 mb-4">
                        <i class="fas fa-briefcase text-blue-600"></i>
                        직무별 평균 점수
                    </h3>
                    <div class="chart-container">
                        <canvas id="jobPerformanceChart"></canvas>
                    </div>
                </div>
            </div>

            <!-- Charts Row 3 -->
            <div class="grid grid-cols-1 gap-6 mb-6">
                <!-- 시간대별 활동 -->
                <div class="bg-white rounded-lg shadow-lg p-6">
                    <h3 class="text-lg font-bold text-gray-800 mb-4">
                        <i class="fas fa-calendar-alt text-purple-600"></i>
                        시간대별 면접 활동 (24시간)
                    </h3>
                    <div class="chart-container" style="height: 250px;">
                        <canvas id="hourlyActivityChart"></canvas>
                    </div>
                </div>
            </div>

            <!-- Top/Bottom Interviews -->
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
                <!-- 최고 점수 -->
                <div class="bg-white rounded-lg shadow-lg p-6">
                    <h3 class="text-lg font-bold text-gray-800 mb-4">
                        <i class="fas fa-medal text-yellow-500"></i>
                        최고 점수 면접 Top 5
                    </h3>
                    <div id="topInterviews" class="space-y-3">
                        <!-- Dynamic content -->
                    </div>
                </div>

                <!-- 최저 점수 -->
                <div class="bg-white rounded-lg shadow-lg p-6">
                    <h3 class="text-lg font-bold text-gray-800 mb-4">
                        <i class="fas fa-exclamation-triangle text-red-500"></i>
                        개선 필요 면접 Top 5
                    </h3>
                    <div id="worstInterviews" class="space-y-3">
                        <!-- Dynamic content -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let charts = {};
        
        // 한글 직무명 매핑
        const jobTypeNames = {
            'cafe': '카페',
            'cvs': '편의점',
            'restaurant': '음식점',
            'retail': '소매점',
            'fastfood': '패스트푸드'
        };

        async function loadAnalytics() {
            document.getElementById('loadingState').classList.remove('hidden');
            document.getElementById('mainContent').classList.add('hidden');
            
            try {
                const response = await fetch('/api/interview-analytics');
                const result = await response.json();
                
                if (!result.success) {
                    throw new Error(result.error);
                }
                
                const data = result.data;
                updateDashboard(data);
                
                document.getElementById('loadingState').classList.add('hidden');
                document.getElementById('mainContent').classList.remove('hidden');
                
            } catch (error) {
                console.error('Analytics load error:', error);
                document.getElementById('loadingState').innerHTML = `
                    <div class="text-red-600">
                        <i class="fas fa-exclamation-circle text-4xl"></i>
                        <p class="mt-4">데이터 로드 실패: ${error.message}</p>
                        <button onclick="loadAnalytics()" class="mt-4 px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">
                            다시 시도
                        </button>
                    </div>
                `;
            }
        }

        function updateDashboard(data) {
            // Update timestamp
            document.getElementById('lastUpdate').textContent = new Date().toLocaleString('ko-KR');
            
            // Update KPIs
            const completion = data.completion;
            document.getElementById('completionRate').textContent = `${completion.completion_rate}%`;
            document.getElementById('completionDetail').textContent = 
                `완료 ${completion.completed} / 시작 ${completion.total_started}`;
            
            // Calculate average score from grade_stats
            const gradeStats = data.grade_stats;
            if (gradeStats.length > 0) {
                const totalScore = gradeStats.reduce((sum, g) => sum + (g.avg_score * g.count), 0);
                const totalCount = gradeStats.reduce((sum, g) => sum + g.count, 0);
                const avgScore = totalCount > 0 ? (totalScore / totalCount).toFixed(1) : 0;
                document.getElementById('avgScore').textContent = avgScore;
                document.getElementById('avgScoreDetail').textContent = `${totalCount}개 면접 평균`;
                
                // Average duration
                const totalDuration = gradeStats.reduce((sum, g) => sum + (g.avg_duration * g.count), 0);
                const avgDuration = totalCount > 0 ? Math.round(totalDuration / totalCount) : 0;
                const minutes = Math.floor(avgDuration / 60);
                const seconds = avgDuration % 60;
                document.getElementById('avgDuration').textContent = `${minutes}분 ${seconds}초`;
                document.getElementById('avgDurationDetail').textContent = `${totalCount}개 완료 면접`;
            } else {
                document.getElementById('avgScore').textContent = '-';
                document.getElementById('avgScoreDetail').textContent = '데이터 없음';
                document.getElementById('avgDuration').textContent = '-';
                document.getElementById('avgDurationDetail').textContent = '데이터 없음';
            }
            
            document.getElementById('avgResponseTime').textContent = `${data.avg_response_time_seconds}초`;
            
            // Create charts
            createScoresTrendChart(data.scores_trend.daily);
            createDropoffChart(data.dropoff_analysis);
            createGradeDistChart(data.grade_stats);
            createJobPerformanceChart(data.job_performance);
            createHourlyActivityChart(data.hourly_activity);
            
            // Update top/worst interviews
            updateInterviewsList('topInterviews', data.top_interviews, true);
            updateInterviewsList('worstInterviews', data.worst_interviews, false);
        }

        function createScoresTrendChart(data) {
            const ctx = document.getElementById('scoresTrendChart');
            if (charts.scoresTrend) charts.scoresTrend.destroy();
            
            charts.scoresTrend = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: data.map(d => d.date),
                    datasets: [{
                        label: '평균 점수',
                        data: data.map(d => d.avg_score),
                        borderColor: 'rgb(34, 197, 94)',
                        backgroundColor: 'rgba(34, 197, 94, 0.1)',
                        tension: 0.4,
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            max: 40
                        }
                    }
                }
            });
        }

        function createDropoffChart(data) {
            const ctx = document.getElementById('dropoffChart');
            if (charts.dropoff) charts.dropoff.destroy();
            
            charts.dropoff = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: data.map(d => `Q${d.question_count}`),
                    datasets: [{
                        label: '이탈 세션 수',
                        data: data.map(d => d.session_count),
                        backgroundColor: 'rgba(239, 68, 68, 0.7)',
                        borderColor: 'rgb(239, 68, 68)',
                        borderWidth: 1
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: {
                                stepSize: 1
                            }
                        }
                    }
                }
            });
        }

        function createGradeDistChart(data) {
            const ctx = document.getElementById('gradeDistChart');
            if (charts.gradeDist) charts.gradeDist.destroy();
            
            const gradeColors = {
                'S': '#fbbf24',
                'A': '#34d399',
                'B': '#60a5fa',
                'C': '#a78bfa',
                'D': '#f87171'
            };
            
            charts.gradeDist = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: data.map(d => `등급 ${d.final_grade}`),
                    datasets: [{
                        data: data.map(d => d.count),
                        backgroundColor: data.map(d => gradeColors[d.final_grade] || '#94a3b8')
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'bottom'
                        }
                    }
                }
            });
        }

        function createJobPerformanceChart(data) {
            const ctx = document.getElementById('jobPerformanceChart');
            if (charts.jobPerformance) charts.jobPerformance.destroy();
            
            charts.jobPerformance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: data.map(d => jobTypeNames[d.job_type] || d.job_type),
                    datasets: [{
                        label: '평균 점수',
                        data: data.map(d => d.avg_score || 0),
                        backgroundColor: 'rgba(59, 130, 246, 0.7)',
                        borderColor: 'rgb(59, 130, 246)',
                        borderWidth: 1
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            max: 40
                        }
                    }
                }
            });
        }

        function createHourlyActivityChart(data) {
            const ctx = document.getElementById('hourlyActivityChart');
            if (charts.hourlyActivity) charts.hourlyActivity.destroy();
            
            charts.hourlyActivity = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: data.map(d => `${d.hour}시`),
                    datasets: [
                        {
                            label: '시작 면접',
                            data: data.map(d => d.interviews),
                            borderColor: 'rgb(147, 51, 234)',
                            backgroundColor: 'rgba(147, 51, 234, 0.1)',
                            tension: 0.4,
                            fill: true
                        },
                        {
                            label: '완료 면접',
                            data: data.map(d => d.completed),
                            borderColor: 'rgb(34, 197, 94)',
                            backgroundColor: 'rgba(34, 197, 94, 0.1)',
                            tension: 0.4,
                            fill: true
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'top'
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: {
                                stepSize: 1
                            }
                        }
                    }
                }
            });
        }

        function updateInterviewsList(elementId, interviews, isTop) {
            const container = document.getElementById(elementId);
            
            if (interviews.length === 0) {
                container.innerHTML = '<p class="text-gray-500 text-sm">데이터 없음</p>';
                return;
            }
            
            container.innerHTML = interviews.map((interview, index) => {
                const gradeColors = {
                    'S': 'bg-yellow-100 text-yellow-800',
                    'A': 'bg-green-100 text-green-800',
                    'B': 'bg-blue-100 text-blue-800',
                    'C': 'bg-purple-100 text-purple-800',
                    'D': 'bg-red-100 text-red-800'
                };
                const gradeClass = gradeColors[interview.final_grade] || 'bg-gray-100 text-gray-800';
                
                return `
                    <div class="flex items-center justify-between p-3 bg-gray-50 rounded-lg">
                        <div class="flex items-center space-x-3">
                            <span class="text-lg font-bold text-gray-400">#${index + 1}</span>
                            <div>
                                <div class="font-medium text-gray-800">
                                    ${jobTypeNames[interview.job_type] || interview.job_type}
                                </div>
                                <div class="text-xs text-gray-500">${new Date(interview.started_at).toLocaleString('ko-KR')}</div>
                            </div>
                        </div>
                        <div class="flex items-center space-x-2">
                            <span class="px-3 py-1 ${gradeClass} rounded-full text-sm font-bold">
                                ${interview.final_grade}
                            </span>
                            <span class="text-lg font-bold text-gray-700">${interview.total_score}점</span>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Load on page load
        loadAnalytics();
        
        // Auto-refresh every 60 seconds
        setInterval(loadAnalytics, 60000);
        
        // 로그아웃 함수
        function logout() {
            if (confirm('로그아웃 하시겠습니까?')) {
                localStorage.removeItem('admin_token');
                window.location.href = '/admin-login.html';
            }
        }
        
        // CSV 내보내기 메뉴 토글
        function toggleExportMenu() {
            const menu = document.getElementById('exportMenu');
            menu.classList.toggle('hidden');
        }
        
        // 메뉴 외부 클릭 시 닫기
        document.addEventListener('click', function(event) {
            const menu = document.getElementById('exportMenu');
            const button = event.target.closest('button');
            if (button && button.textContent.includes('CSV 내보내기')) {
                return;
            }
            if (menu && !menu.contains(event.target)) {
                menu.classList.add('hidden');
            }
        });
        
        // CSV 내보내기 함수
        async function exportCSV(type, days) {
            const menu = document.getElementById('exportMenu');
            menu.classList.add('hidden');
            
            const token = localStorage.getItem('admin_token');
            if (!token) {
                alert('로그인이 필요합니다');
                window.location.href = '/admin-login.html';
                return;
            }
            
            try {
                const response = await fetch(`/api/export-csv?type=${type}&days=${days}`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                
                if (!response.ok) {
                    throw new Error('다운로드 실패');
                }
                
                // CSV 파일 다운로드
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `${type}_${days}days_${new Date().toISOString().split('T')[0]}.csv`;
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(url);
                document.body.removeChild(a);
                
                console.log(`✅ CSV 다운로드 완료: ${type} (${days}일)`);
            } catch (error) {
                console.error('CSV 다운로드 오류:', error);
                alert('CSV 다운로드에 실패했습니다');
            }
        }
    </script>
</body>
</html>
