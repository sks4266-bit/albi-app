<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>❌ 결제 실패 - Albi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50">
    <div class="max-w-2xl mx-auto p-6 flex items-center justify-center min-h-screen">
        <div class="bg-white rounded-2xl shadow-lg p-8 text-center w-full">
            <div class="w-20 h-20 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-6">
                <i class="fas fa-exclamation-triangle text-red-600 text-4xl"></i>
            </div>
            <h1 class="text-3xl font-bold text-gray-800 mb-4">결제에 실패했습니다</h1>
            <p class="text-gray-600 mb-2" id="errorCode"></p>
            <p class="text-gray-600 mb-8" id="errorMessage"></p>

            <div class="bg-yellow-50 border-l-4 border-yellow-400 p-4 mb-6 text-left">
                <p class="text-sm text-gray-700">
                    <strong>자주 발생하는 원인:</strong><br>
                    • 카드 한도 초과<br>
                    • 카드 정보 오류<br>
                    • 은행 승인 거부<br>
                    • 네트워크 오류
                </p>
            </div>

            <a href="/payment.html" 
               class="inline-block w-full bg-blue-600 text-white font-bold py-4 rounded-lg hover:bg-blue-700 transition duration-200 mb-3">
                <i class="fas fa-redo mr-2"></i>다시 시도하기
            </a>

            <a href="/chat.html" 
               class="inline-block w-full bg-gray-200 text-gray-700 font-semibold py-4 rounded-lg hover:bg-gray-300 transition duration-200">
                <i class="fas fa-home mr-2"></i>홈으로 돌아가기
            </a>

            <p class="text-sm text-gray-500 mt-6">
                문제가 계속되면 <a href="mailto:albi260128@gmail.com" class="text-blue-600 hover:underline">albi260128@gmail.com</a>로 문의해주세요.
            </p>
        </div>
    </div>

    <script>
        // URL 파라미터에서 에러 정보 추출
        const urlParams = new URLSearchParams(window.location.search);
        const errorCode = urlParams.get('code');
        const errorMessage = urlParams.get('message');

        if (errorCode) {
            document.getElementById('errorCode').textContent = `에러 코드: ${errorCode}`;
        }

        if (errorMessage) {
            document.getElementById('errorMessage').textContent = decodeURIComponent(errorMessage);
        } else {
            document.getElementById('errorMessage').textContent = '결제 처리 중 문제가 발생했습니다.';
        }
    </script>
</body>
</html>
