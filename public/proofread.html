<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📝 AI 교정 - Albi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/axios@1.6.0/dist/axios.min.js"></script>
</head>
<body class="bg-gradient-to-br from-purple-50 to-indigo-100 min-h-screen">
    <!-- 헤더 -->
    <header class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <a href="/mentor-chat.html" class="text-2xl font-bold text-purple-600">
                    <i class="fas fa-robot mr-2"></i>Albi
                </a>
                <span class="text-gray-400">|</span>
                <h1 class="text-lg font-semibold text-gray-700">AI 교정</h1>
            </div>
            <nav class="hidden md:flex items-center gap-4">
                <a href="/mentor-chat.html" class="text-gray-600 hover:text-purple-600 transition">
                    <i class="fas fa-comments mr-1"></i>멘토 채팅
                </a>
                <a href="/assignments.html" class="text-gray-600 hover:text-purple-600 transition">
                    <i class="fas fa-tasks mr-1"></i>과제
                </a>
                <a href="/portfolio.html" class="text-gray-600 hover:text-purple-600 transition">
                    <i class="fas fa-briefcase mr-1"></i>포트폴리오
                </a>
                <a href="/growth-dashboard.html" class="text-gray-600 hover:text-purple-600 transition">
                    <i class="fas fa-chart-line mr-1"></i>대시보드
                </a>
            </nav>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-8">
        <!-- 설명 섹션 -->
        <div class="bg-white rounded-lg shadow-md p-6 mb-6">
            <h2 class="text-2xl font-bold text-gray-800 mb-3">
                <i class="fas fa-magic text-purple-600 mr-2"></i>AI 교정 서비스
            </h2>
            <p class="text-gray-600 mb-4">
                이력서, 자기소개서, 이메일 등 다양한 문서를 AI가 전문적으로 교정해드립니다.
            </p>
            <div class="grid md:grid-cols-4 gap-3">
                <div class="flex items-start gap-2">
                    <i class="fas fa-check-circle text-green-500 mt-1"></i>
                    <span class="text-sm text-gray-700">맞춤법 및 띄어쓰기 교정</span>
                </div>
                <div class="flex items-start gap-2">
                    <i class="fas fa-check-circle text-green-500 mt-1"></i>
                    <span class="text-sm text-gray-700">문장 구조 개선</span>
                </div>
                <div class="flex items-start gap-2">
                    <i class="fas fa-check-circle text-green-500 mt-1"></i>
                    <span class="text-sm text-gray-700">어휘 선택 최적화</span>
                </div>
                <div class="flex items-start gap-2">
                    <i class="fas fa-check-circle text-green-500 mt-1"></i>
                    <span class="text-sm text-gray-700">논리적 흐름 개선</span>
                </div>
            </div>
        </div>

        <div class="grid lg:grid-cols-2 gap-6">
            <!-- 입력 영역 -->
            <div class="bg-white rounded-lg shadow-md p-6">
                <h3 class="text-xl font-bold text-gray-800 mb-4">
                    <i class="fas fa-edit text-purple-600 mr-2"></i>교정할 텍스트
                </h3>

                <!-- 문서 유형 선택 -->
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">문서 유형</label>
                    <select id="documentType" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-purple-500">
                        <option value="resume">이력서</option>
                        <option value="cover_letter">자기소개서</option>
                        <option value="email">이메일</option>
                        <option value="essay">에세이</option>
                        <option value="general">일반 문서</option>
                    </select>
                </div>

                <!-- 톤 선택 -->
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">목표 톤</label>
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-2">
                        <button type="button" class="tone-btn active" data-tone="formal">
                            <i class="fas fa-user-tie mr-1"></i>격식체
                        </button>
                        <button type="button" class="tone-btn" data-tone="casual">
                            <i class="fas fa-smile mr-1"></i>편안함
                        </button>
                        <button type="button" class="tone-btn" data-tone="business">
                            <i class="fas fa-briefcase mr-1"></i>비즈니스
                        </button>
                        <button type="button" class="tone-btn" data-tone="academic">
                            <i class="fas fa-graduation-cap mr-1"></i>학술적
                        </button>
                    </div>
                </div>

                <!-- 텍스트 입력 -->
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">텍스트 입력</label>
                    <textarea 
                        id="originalText" 
                        rows="12"
                        placeholder="교정할 텍스트를 입력하세요..."
                        class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-purple-500 resize-none"
                    ></textarea>
                    <div class="flex justify-between items-center mt-2">
                        <span id="charCount" class="text-sm text-gray-500">0 자</span>
                        <button 
                            id="clearBtn"
                            class="text-sm text-gray-500 hover:text-red-600"
                        >
                            <i class="fas fa-times mr-1"></i>지우기
                        </button>
                    </div>
                </div>

                <!-- 교정 버튼 -->
                <button 
                    id="proofreadBtn"
                    class="w-full bg-gradient-to-r from-purple-600 to-indigo-600 text-white py-3 rounded-lg font-semibold hover:from-purple-700 hover:to-indigo-700 transition disabled:opacity-50 disabled:cursor-not-allowed"
                >
                    <i class="fas fa-magic mr-2"></i>AI 교정 시작
                </button>
            </div>

            <!-- 결과 영역 -->
            <div class="bg-white rounded-lg shadow-md p-6">
                <h3 class="text-xl font-bold text-gray-800 mb-4">
                    <i class="fas fa-check-circle text-green-600 mr-2"></i>교정 결과
                </h3>

                <div id="resultContainer" class="hidden">
                    <!-- 통계 -->
                    <div class="grid grid-cols-3 gap-3 mb-4">
                        <div class="bg-purple-50 rounded-lg p-3 text-center">
                            <div class="text-2xl font-bold text-purple-600" id="totalChanges">0</div>
                            <div class="text-xs text-gray-600">총 수정</div>
                        </div>
                        <div class="bg-red-50 rounded-lg p-3 text-center">
                            <div class="text-2xl font-bold text-red-600" id="spellingErrors">0</div>
                            <div class="text-xs text-gray-600">맞춤법</div>
                        </div>
                        <div class="bg-blue-50 rounded-lg p-3 text-center">
                            <div class="text-2xl font-bold text-blue-600" id="grammarErrors">0</div>
                            <div class="text-xs text-gray-600">문법</div>
                        </div>
                    </div>

                    <!-- 교정된 텍스트 -->
                    <div class="mb-4">
                        <div class="flex justify-between items-center mb-2">
                            <label class="block text-sm font-medium text-gray-700">교정된 텍스트</label>
                            <button id="copyBtn" class="text-sm text-purple-600 hover:text-purple-800">
                                <i class="fas fa-copy mr-1"></i>복사
                            </button>
                        </div>
                        <div id="correctedText" class="border border-gray-300 rounded-lg px-4 py-3 bg-gray-50 max-h-64 overflow-y-auto text-sm leading-relaxed"></div>
                    </div>

                    <!-- 전체 평가 -->
                    <div class="bg-blue-50 border border-blue-200 rounded-lg p-4 mb-4">
                        <h4 class="font-semibold text-blue-800 mb-2">
                            <i class="fas fa-lightbulb mr-1"></i>AI 평가
                        </h4>
                        <p id="overallAssessment" class="text-sm text-blue-900"></p>
                    </div>

                    <!-- 수정 내역 -->
                    <div>
                        <h4 class="font-semibold text-gray-800 mb-2">수정 내역</h4>
                        <div id="changesList" class="space-y-2 max-h-64 overflow-y-auto"></div>
                    </div>
                </div>

                <div id="loadingContainer" class="hidden text-center py-12">
                    <i class="fas fa-spinner fa-spin text-4xl text-purple-600 mb-4"></i>
                    <p class="text-gray-600">AI가 교정 중입니다...</p>
                </div>

                <div id="emptyContainer" class="text-center py-12 text-gray-400">
                    <i class="fas fa-file-alt text-5xl mb-4"></i>
                    <p>교정할 텍스트를 입력하고<br>AI 교정 버튼을 클릭하세요</p>
                </div>
            </div>
        </div>
    </main>

    <style>
        .tone-btn {
            padding: 0.5rem 1rem;
            border: 2px solid #e5e7eb;
            border-radius: 0.5rem;
            background: white;
            color: #6b7280;
            font-size: 0.875rem;
            transition: all 0.2s;
        }
        .tone-btn:hover {
            border-color: #a855f7;
            color: #a855f7;
        }
        .tone-btn.active {
            background: linear-gradient(to right, #9333ea, #6366f1);
            border-color: #9333ea;
            color: white;
        }
    </style>

    <script>
        const userId = localStorage.getItem('albi_user_id') || 'demo-user-' + Date.now();
        localStorage.setItem('albi_user_id', userId);

        let selectedTone = 'formal';

        // 톤 선택
        document.querySelectorAll('.tone-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tone-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selectedTone = btn.dataset.tone;
            });
        });

        // 글자 수 카운트
        const originalText = document.getElementById('originalText');
        const charCount = document.getElementById('charCount');
        originalText.addEventListener('input', () => {
            charCount.textContent = originalText.value.length + ' 자';
        });

        // 지우기 버튼
        document.getElementById('clearBtn').addEventListener('click', () => {
            originalText.value = '';
            charCount.textContent = '0 자';
        });

        // 교정 버튼
        document.getElementById('proofreadBtn').addEventListener('click', async () => {
            const text = originalText.value.trim();
            const type = document.getElementById('documentType').value;

            if (!text) {
                alert('텍스트를 입력해주세요.');
                return;
            }

            if (text.length < 10) {
                alert('최소 10자 이상 입력해주세요.');
                return;
            }

            // UI 상태 변경
            document.getElementById('emptyContainer').classList.add('hidden');
            document.getElementById('resultContainer').classList.add('hidden');
            document.getElementById('loadingContainer').classList.remove('hidden');
            document.getElementById('proofreadBtn').disabled = true;

            try {
                const response = await axios.post('/api/proofread', {
                    user_id: userId,
                    text: text,
                    type: type,
                    target: selectedTone
                });

                if (response.data.success) {
                    displayResult(response.data.data);
                } else {
                    throw new Error(response.data.error || '교정 실패');
                }
            } catch (error) {
                console.error('교정 에러:', error);
                
                if (error.response?.status === 403) {
                    alert('구독이 필요한 서비스입니다.\n결제 페이지로 이동합니다.');
                    window.location.href = '/payment.html';
                } else {
                    alert('교정 중 오류가 발생했습니다: ' + (error.response?.data?.error || error.message));
                    document.getElementById('loadingContainer').classList.add('hidden');
                    document.getElementById('emptyContainer').classList.remove('hidden');
                }
            } finally {
                document.getElementById('proofreadBtn').disabled = false;
            }
        });

        // 결과 표시
        function displayResult(data) {
            document.getElementById('loadingContainer').classList.add('hidden');
            document.getElementById('resultContainer').classList.remove('hidden');

            // 통계
            document.getElementById('totalChanges').textContent = data.statistics.total_changes || 0;
            document.getElementById('spellingErrors').textContent = data.statistics.spelling_errors || 0;
            document.getElementById('grammarErrors').textContent = data.statistics.grammar_errors || 0;

            // 교정된 텍스트
            document.getElementById('correctedText').textContent = data.corrected_text;

            // 전체 평가
            document.getElementById('overallAssessment').textContent = data.overall_assessment;

            // 수정 내역
            const changesList = document.getElementById('changesList');
            changesList.innerHTML = '';

            if (data.changes && data.changes.length > 0) {
                data.changes.forEach((change, index) => {
                    const categoryIcons = {
                        'spelling': 'fa-spell-check text-red-500',
                        'grammar': 'fa-book text-blue-500',
                        'structure': 'fa-sitemap text-purple-500',
                        'vocabulary': 'fa-language text-green-500',
                        'clarity': 'fa-eye text-indigo-500'
                    };

                    const icon = categoryIcons[change.category] || 'fa-edit text-gray-500';

                    const changeDiv = document.createElement('div');
                    changeDiv.className = 'border border-gray-200 rounded-lg p-3 bg-gray-50';
                    changeDiv.innerHTML = `
                        <div class="flex items-start gap-2 mb-2">
                            <i class="fas ${icon} mt-1"></i>
                            <div class="flex-1">
                                <div class="text-sm text-gray-500 line-through mb-1">${escapeHtml(change.original)}</div>
                                <div class="text-sm text-gray-900 font-medium">${escapeHtml(change.corrected)}</div>
                            </div>
                        </div>
                        <div class="text-xs text-gray-600 bg-white rounded px-2 py-1">${escapeHtml(change.reason)}</div>
                    `;
                    changesList.appendChild(changeDiv);
                });
            } else {
                changesList.innerHTML = '<p class="text-sm text-gray-500 text-center py-4">수정 사항이 없습니다. 완벽합니다! 👍</p>';
            }
        }

        // 복사 버튼
        document.getElementById('copyBtn').addEventListener('click', () => {
            const text = document.getElementById('correctedText').textContent;
            navigator.clipboard.writeText(text).then(() => {
                const btn = document.getElementById('copyBtn');
                const originalHtml = btn.innerHTML;
                btn.innerHTML = '<i class="fas fa-check mr-1"></i>복사됨!';
                setTimeout(() => {
                    btn.innerHTML = originalHtml;
                }, 2000);
            });
        });

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
