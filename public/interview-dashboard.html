<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>성장 추이 대시보드 | Albi AI</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-50">
    <!-- Header -->
    <header class="bg-white shadow">
        <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <a href="/" class="flex items-center space-x-2">
                    <i class="fas fa-robot text-3xl text-purple-600"></i>
                    <span class="text-xl font-bold">Albi AI</span>
                </a>
            </div>
            <a href="/video-interview.html" class="bg-purple-600 text-white px-4 py-2 rounded-lg hover:bg-purple-700">
                <i class="fas fa-video mr-2"></i>면접 보러 가기
            </a>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 py-8">
        <h1 class="text-3xl font-bold mb-8">
            <i class="fas fa-chart-line mr-2 text-purple-600"></i>
            성장 추이 대시보드
        </h1>

        <!-- Loading -->
        <div id="loading" class="text-center py-12">
            <i class="fas fa-spinner fa-spin text-4xl text-purple-600"></i>
            <p class="mt-4 text-gray-600">데이터를 불러오는 중...</p>
        </div>

        <!-- Content -->
        <div id="content" class="hidden">
            <!-- Statistics Cards -->
            <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
                <div class="bg-white rounded-xl shadow p-6">
                    <div class="flex items-center justify-between mb-2">
                        <h3 class="text-sm font-medium text-gray-600">총 면접 수</h3>
                        <i class="fas fa-clipboard-list text-blue-500"></i>
                    </div>
                    <p id="totalInterviews" class="text-3xl font-bold">0</p>
                </div>

                <div class="bg-white rounded-xl shadow p-6">
                    <div class="flex items-center justify-between mb-2">
                        <h3 class="text-sm font-medium text-gray-600">평균 점수</h3>
                        <i class="fas fa-star text-yellow-500"></i>
                    </div>
                    <p id="avgScore" class="text-3xl font-bold">0</p>
                </div>

                <div class="bg-white rounded-xl shadow p-6">
                    <div class="flex items-center justify-between mb-2">
                        <h3 class="text-sm font-medium text-gray-600">최고 점수</h3>
                        <i class="fas fa-trophy text-green-500"></i>
                    </div>
                    <p id="maxScore" class="text-3xl font-bold">0</p>
                </div>

                <div class="bg-white rounded-xl shadow p-6">
                    <div class="flex items-center justify-between mb-2">
                        <h3 class="text-sm font-medium text-gray-600">총 학습 시간</h3>
                        <i class="fas fa-clock text-purple-500"></i>
                    </div>
                    <p id="totalHours" class="text-3xl font-bold">0<span class="text-lg">시간</span></p>
                </div>
            </div>

            <!-- Charts -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                <div class="bg-white rounded-xl shadow p-6">
                    <h3 class="text-lg font-bold mb-4">
                        <i class="fas fa-chart-line mr-2 text-purple-600"></i>
                        점수 추이
                    </h3>
                    <canvas id="trendChart"></canvas>
                </div>

                <div class="bg-white rounded-xl shadow p-6">
                    <h3 class="text-lg font-bold mb-4">
                        <i class="fas fa-chart-pie mr-2 text-purple-600"></i>
                        영상 vs 답변 점수
                    </h3>
                    <canvas id="comparisonChart"></canvas>
                </div>
            </div>

            <!-- Recent Interviews -->
            <div class="bg-white rounded-xl shadow p-6">
                <h3 class="text-lg font-bold mb-4">
                    <i class="fas fa-history mr-2 text-purple-600"></i>
                    최근 면접 이력
                </h3>
                <div id="recentInterviews" class="space-y-4"></div>
            </div>
        </div>

        <!-- No Data -->
        <div id="noData" class="hidden text-center py-12">
            <i class="fas fa-inbox text-6xl text-gray-300 mb-4"></i>
            <p class="text-gray-600 mb-4">아직 면접 이력이 없습니다</p>
            <a href="/video-interview.html" class="inline-block bg-purple-600 text-white px-6 py-3 rounded-lg hover:bg-purple-700">
                첫 면접 시작하기
            </a>
        </div>
    </main>

    <script>
        let trendChart = null;
        let comparisonChart = null;

        async function loadDashboard() {
            try {
                const email = getUserEmail();
                const response = await fetch(`/api/interview-history?email=${encodeURIComponent(email)}&limit=100`);
                
                if (!response.ok) {
                    throw new Error('데이터 로드 실패');
                }

                const result = await response.json();
                
                if (!result.success) {
                    throw new Error(result.error || '데이터 로드 실패');
                }

                const { statistics, interviews } = result.data;

                document.getElementById('loading').classList.add('hidden');

                if (statistics.totalInterviews === 0) {
                    document.getElementById('noData').classList.remove('hidden');
                    return;
                }

                document.getElementById('content').classList.remove('hidden');

                // Statistics
                document.getElementById('totalInterviews').textContent = statistics.totalInterviews;
                document.getElementById('avgScore').textContent = statistics.avgScore;
                document.getElementById('maxScore').textContent = statistics.maxScore;
                document.getElementById('totalHours').innerHTML = `${statistics.totalHours}<span class="text-lg">시간</span>`;

                // Charts
                renderTrendChart(statistics.recentTrend);
                renderComparisonChart(statistics);

                // Recent interviews
                renderRecentInterviews(interviews);

            } catch (error) {
                console.error('[Dashboard] Error:', error);
                document.getElementById('loading').innerHTML = `
                    <i class="fas fa-exclamation-triangle text-4xl text-red-500"></i>
                    <p class="mt-4 text-red-600">${error.message}</p>
                `;
            }
        }

        function renderTrendChart(trend) {
            const ctx = document.getElementById('trendChart').getContext('2d');
            
            if (trendChart) {
                trendChart.destroy();
            }

            const dates = trend.map(t => new Date(t.date).toLocaleDateString('ko-KR', { month: 'short', day: 'numeric' })).reverse();
            const scores = trend.map(t => t.score).reverse();

            trendChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: dates,
                    datasets: [{
                        label: '종합 점수',
                        data: scores,
                        borderColor: '#9333ea',
                        backgroundColor: 'rgba(147, 51, 234, 0.1)',
                        tension: 0.4,
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: {
                            display: false
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            max: 100
                        }
                    }
                }
            });
        }

        function renderComparisonChart(stats) {
            const ctx = document.getElementById('comparisonChart').getContext('2d');
            
            if (comparisonChart) {
                comparisonChart.destroy();
            }

            comparisonChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['영상 분석', '답변 분석'],
                    datasets: [{
                        data: [stats.avgVideoScore, stats.avgAnswerScore],
                        backgroundColor: ['#3b82f6', '#10b981']
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: {
                            position: 'bottom'
                        }
                    }
                }
            });
        }

        function renderRecentInterviews(interviews) {
            const container = document.getElementById('recentInterviews');
            
            if (interviews.length === 0) {
                container.innerHTML = '<p class="text-gray-500 text-center">면접 이력이 없습니다</p>';
                return;
            }

            container.innerHTML = interviews.slice(0, 5).map(interview => `
                <div class="border rounded-lg p-4 hover:bg-gray-50 transition-colors">
                    <div class="flex items-center justify-between mb-2">
                        <div>
                            <h4 class="font-bold">${interview.company_name} - ${interview.position}</h4>
                            <p class="text-sm text-gray-500">${new Date(interview.created_at).toLocaleString('ko-KR')}</p>
                        </div>
                        <div class="text-right">
                            <p class="text-2xl font-bold text-purple-600">${interview.final_score}</p>
                            <p class="text-sm text-gray-500">${interview.final_grade} 등급</p>
                        </div>
                    </div>
                    <div class="flex items-center space-x-4 text-sm">
                        <span class="text-blue-600">
                            <i class="fas fa-video mr-1"></i>
                            영상: ${interview.video_score}
                        </span>
                        <span class="text-green-600">
                            <i class="fas fa-comments mr-1"></i>
                            답변: ${interview.answer_score}
                        </span>
                        <span class="text-purple-600">
                            <i class="fas fa-briefcase mr-1"></i>
                            ${interview.hiring_probability}
                        </span>
                    </div>
                </div>
            `).join('');
        }

        function getUserEmail() {
            const urlParams = new URLSearchParams(window.location.search);
            const emailParam = urlParams.get('email');
            
            if (emailParam) {
                localStorage.setItem('userEmail', emailParam);
                return emailParam;
            }
            
            const storedEmail = localStorage.getItem('userEmail');
            if (storedEmail) {
                return storedEmail;
            }
            
            return 'test@example.com';
        }

        // Load dashboard on page load
        document.addEventListener('DOMContentLoaded', loadDashboard);
    </script>
</body>
</html>
